<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🏃 VungTauGO! Pro - Anti-Cheat</title>
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0b0f15;
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px;
      overflow: hidden;
    }
    #app {
      width: 100%;
      max-width: 480px;
      background: #1a1f2b;
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      height: 85vh;
    }
    .header {
      padding: 20px 20px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .title {
      font-weight: 800;
      font-size: 18px;
      background: linear-gradient(135deg, #00e5ff, #007bff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .target-badge {
      background: #252c3b;
      padding: 8px 14px;
      border-radius: 40px;
      font-weight: 700;
      color: #fbbf24;
      border: 1px solid #3e4c61;
    }
    .stats-panel {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      padding: 15px;
      background: #212838;
      margin: 10px 16px;
      border-radius: 24px;
    }
    .stat-item { text-align: center; }
    .stat-value {
      font-size: 28px;
      font-weight: 800;
      color: #f0f9ff;
    }
    .stat-label {
      font-size: 10px;
      color: #8a9bb5;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .map-container {
      flex: 1;
      margin: 0 16px;
      border-radius: 24px;
      overflow: hidden;
      position: relative;
      border: 2px solid #2e3a4e;
    }
    #map { width: 100%; height: 100%; z-index: 1; }
    .overlay-info {
      position: absolute;
      bottom: 10px;
      left: 10px;
      right: 10px;
      display: flex;
      justify-content: space-between;
      z-index: 1000;
      pointer-events: none;
    }
    .badge {
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(4px);
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 11px;
      color: #4ade80;
    }
    .violation-toast {
      position: absolute;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      background: #ef4444;
      color: white;
      padding: 8px 16px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: bold;
      z-index: 1001;
      opacity: 0;
      transition: 0.3s;
    }
    .controls {
      display: flex;
      gap: 12px;
      padding: 20px 16px;
    }
    .btn {
      flex: 1;
      padding: 15px;
      border: none;
      border-radius: 50px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: 0.2s;
    }
    .btn-primary { background: #007bff; color: white; }
    .btn-secondary { background: #374151; color: #e5e7eb; }
    .btn:disabled { opacity: 0.3; }

    /* Modal */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      visibility: hidden;
    }
    .modal-content {
      background: #1e293b;
      padding: 30px;
      border-radius: 32px;
      text-align: center;
      width: 85%;
      max-width: 350px;
      border: 2px solid #fbbf24;
    }
    .voucher {
      margin: 20px 0;
      padding: 15px;
      background: #0f172a;
      border: 2px dashed #fbbf24;
      font-size: 24px;
      font-weight: 800;
      color: #facc15;
    }
  </style>
</head>
<body>

<div id="app">
  <div class="header">
    <span class="title">VUNGTAUGO PRO</span>
    <div class="target-badge" id="targetDisplay">🎯 100m</div>
  </div>

  <div class="stats-panel">
    <div class="stat-item">
      <div class="stat-value" id="distVal">0</div>
      <div class="stat-label">Mét</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="stepVal">0</div>
      <div class="stat-label">Bước</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="timeVal">00:00</div>
      <div class="stat-label">Giây</div>
    </div>
  </div>

  <div class="map-container">
    <div id="map"></div>
    <div class="violation-toast" id="toast">⚠️ Phát hiện gian lận!</div>
    <div class="overlay-info">
      <div class="badge" id="gpsStatus">🛰️ Chờ GPS...</div>
      <div class="badge" id="modeStatus" style="color:#fbbf24">⚖️ Ready</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-primary" id="startBtn"><i class="fas fa-play"></i> BẮT ĐẦU</button>
    <button class="btn btn-secondary" id="pauseBtn" disabled><i class="fas fa-pause"></i> TẠM DỪNG</button>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h2>🏆 HOÀN THÀNH!</h2>
    <p>Hải Đăng đã đạt mục tiêu.</p>
    <div class="voucher" id="vCode">VUNGTAU-6688</div>
    <button class="btn btn-primary" style="width:100%" onclick="location.reload()">TIẾP TỤC</button>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // Cấu hình tối ưu cho Vũng Tàu (địa hình bằng phẳng)
    const CFG = {
      step: { threshold: 12.5, minGap: 280, freqLimit: 3.8, len: 0.72 },
      gps: { maxSpeed: 7.5, minMove: 0.002, accuracyLimit: 35 },
      antiCheat: { penalty: 5, shakeLimit: 22 }
    };

    let state = {
      active: false, paused: false,
      dist: 0, steps: 0, time: 0,
      path: [], lastPos: null, startTime: null,
      shakeCount: 0, stepLen: CFG.step.len
    };

    let map, marker, line, timerIdx;

    function initMap() {
      map = L.map('map', { zoomControl: false, attributionControl: false }).setView([10.346, 107.084], 16);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
    }

    function updateUI() {
      document.getElementById('distVal').innerText = Math.round(state.dist * 1000);
      document.getElementById('stepVal').innerText = state.steps;
      const m = Math.floor(state.time / 60).toString().padStart(2, '0');
      const s = (state.time % 60).toString().padStart(2, '0');
      document.getElementById('timeVal').innerText = `${m}:${s}`;
    }

    function penalize(m, msg) {
      if (!state.active || state.paused) return;
      state.dist = Math.max(0, state.dist - (m/1000));
      const t = document.getElementById('toast');
      t.innerText = `⚠️ ${msg}: -${m}m`;
      t.style.opacity = 1;
      setTimeout(() => t.style.opacity = 0, 2500);
      updateUI();
    }

    // Xử lý đếm bước chân & Lắc tay
    function onMotion(e) {
      if (!state.active || state.paused) return;
      const a = e.accelerationIncludingGravity;
      if (!a) return;
      const mag = Math.sqrt(a.x**2 + a.y**2 + a.z**2);
      const now = Date.now();

      if (mag > CFG.antiCheat.shakeLimit) {
        state.shakeCount++;
        if (state.shakeCount > 5) { penalize(10, "Lắc máy"); state.shakeCount = 0; }
        return;
      }

      if (mag > CFG.step.threshold && (now - (state.lastStep || 0)) > CFG.step.minGap) {
        state.steps++;
        state.lastStep = now;
        // Backup nếu mất GPS
        if (!state.lastGps || (now - state.lastGps > 5000)) {
          state.dist += state.stepLen / 1000;
        }
        updateUI();
      }
    }

    // Xử lý GPS
    function onPos(p) {
      const { latitude: lat, longitude: lng, accuracy: acc } = p.coords;
      const now = p.timestamp;
      document.getElementById('gpsStatus').innerText = `🛰️ GPS: ${Math.round(acc)}m`;

      if (acc > CFG.gps.accuracyLimit) return;

      if (state.active && !state.paused) {
        if (state.lastPos) {
          const d = map.distance([state.lastPos.lat, state.lastPos.lng], [lat, lng]) / 1000;
          const dt = (now - state.lastPos.t) / 1000;
          if (d/dt > CFG.gps.maxSpeed) {
            penalize(CFG.antiCheat.penalty, "Quá nhanh (Xe máy?)");
            return;
          }
          if (d > CFG.gps.minMove) state.dist += d;
        }
        state.lastPos = { lat, lng, t: now };
        state.lastGps = now;
        
        // Cập nhật Map
        state.path.push([lat, lng]);
        if (!line) {
          line = L.polyline(state.path, {color: '#00e5ff', weight: 4}).addTo(map);
          marker = L.circleMarker([lat, lng], {radius: 6, color: '#fff', fillOpacity: 1, fillColor: '#007bff'}).addTo(map);
        } else {
          line.setLatLngs(state.path);
          marker.setLatLng([lat, lng]);
        }
        map.panTo([lat, lng]);
      }
      if (state.dist * 1000 >= 100) {
        state.active = false;
        document.getElementById('modal').style.visibility = 'visible';
      }
    }

    async function start() {
      // Xin quyền cảm biến (IOS)
      if (DeviceMotionEvent && typeof DeviceMotionEvent.requestPermission === 'function') {
        const res = await DeviceMotionEvent.requestPermission();
        if (res !== 'granted') return alert("Cần quyền cảm biến để đếm bước!");
      }
      window.addEventListener('devicemotion', onMotion);
      navigator.geolocation.watchPosition(onPos, console.error, { enableHighAccuracy: true });
      
      state.active = true;
      state.startTime = Date.now();
      timerIdx = setInterval(() => {
        if (!state.paused) { state.time++; updateUI(); }
      }, 1000);

      document.getElementById('startBtn').disabled = true;
      document.getElementById('pauseBtn').disabled = false;
    }

    document.getElementById('startBtn').addEventListener('click', start);
    document.getElementById('pauseBtn').addEventListener('click', () => {
      state.paused = !state.paused;
      document.getElementById('pauseBtn').innerHTML = state.paused ? '<i class="fas fa-play"></i> TIẾP TỤC' : '<i class="fas fa-pause"></i> TẠM DỪNG';
    });

    initMap();
  })();
</script>
</body>
</html>
