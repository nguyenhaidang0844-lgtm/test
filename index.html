<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🏔️ Trail Tracker Pro · Steps · Elevation · Map</title>
  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0b1f1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100dvh;
      margin: 0;
      padding: 6px;
    }
    .app-container {
      max-width: 520px;
      width: 100%;
      background: #142e28;
      border-radius: 36px;
      box-shadow: 0 20px 30px rgba(0,0,0,0.7), inset 0 0 0 2px #2d5a4b;
      color: #e2f3e9;
      display: flex;
      flex-direction: column;
      height: 96dvh;
      max-height: 880px;
      overflow: hidden;
    }
    .header {
      padding: 18px 18px 8px;
      text-align: center;
      border-bottom: 1px solid #2e6b58;
    }
    .header h1 {
      font-weight: 600;
      font-size: 1.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .map-wrapper {
      flex: 2.2;
      min-height: 200px;
      background: #1c4237;
      margin: 10px 12px;
      border-radius: 24px;
      overflow: hidden;
      border: 2px solid #3e826b;
      box-shadow: inset 0 0 0 1px #1f4d3d, 0 6px 0 #0d261e;
    }
    #map { width: 100%; height: 100%; background: #b1d9cb; }
    .stats-grid {
      display: flex;
      justify-content: space-evenly;
      padding: 10px 6px;
      background: #1a4136;
      margin: 0 12px 10px;
      border-radius: 48px;
      border: 1px solid #438b74;
      box-shadow: inset 0 2px 4px #0e2b21, 0 4px 0 #0a1f18;
    }
    .stat-cell {
      text-align: center;
      flex: 1;
    }
    .stat-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #a5d4c1;
      font-weight: 500;
    }
    .stat-value {
      font-size: 2.1rem;
      font-weight: 800;
      line-height: 1.1;
      color: #fbfff0;
      text-shadow: 0 2px 5px #0b241c;
    }
    .unit { font-size: 0.8rem; color: #bbe6d6; margin-left: 2px; }
    .direction-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 16px 8px;
    }
    .compass-badge {
      background: #1f4a3b;
      padding: 6px 18px;
      border-radius: 40px;
      border: 1px solid #5ea58c;
      font-weight: 600;
      font-size: 1.1rem;
    }
    .elev-badge {
      background: #1f4a3b;
      padding: 6px 18px;
      border-radius: 40px;
      border: 1px solid #5ea58c;
      font-weight: 600;
      font-size: 1.1rem;
    }
    .status-area {
      display: flex;
      justify-content: space-between;
      padding: 0 18px 6px;
      font-size: 0.8rem;
      color: #b0decb;
    }
    .controls {
      display: flex;
      gap: 10px;
      padding: 10px 14px 20px;
      justify-content: center;
    }
    .btn {
      background: #266b53;
      border: none;
      border-bottom: 4px solid #0c2b20;
      color: white;
      font-weight: bold;
      font-size: 1.2rem;
      padding: 12px 18px;
      min-width: 100px;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 5px 0 #0a1e16, 0 2px 8px black;
      transition: 0.08s;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      flex: 1;
    }
    .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #0a1e16, 0 2px 6px black; }
    .btn:disabled { opacity: 0.5; transform: none; box-shadow: 0 4px 0 #0a1e16; pointer-events: none; }
    .btn.stop { background: #6b4e4e; border-bottom-color: #2e2121; }
    .btn.reset { background: #3f556b; border-bottom-color: #1f2b3a; }
    .warning-tag {
      color: #fcd34d;
      font-size: 0.75rem;
      margin-left: 8px;
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="header">
    <h1>
      <span>🗺️ TRAIL PRO</span>
      <span style="font-weight:300;">·</span>
      <span>👣 STEP</span>
    </h1>
  </div>
  <div class="map-wrapper">
    <div id="map"></div>
  </div>
  <!-- Steps & Distance -->
  <div class="stats-grid">
    <div class="stat-cell">
      <div class="stat-label">👟 STEPS</div>
      <div class="stat-value" id="stepsDisplay">0</div>
    </div>
    <div class="stat-cell">
      <div class="stat-label">📏 DIST</div>
      <div class="stat-value"><span id="distanceDisplay">0.00</span><span class="unit">km</span></div>
    </div>
    <div class="stat-cell">
      <div class="stat-label">⬆️ GAIN</div>
      <div class="stat-value"><span id="gainDisplay">0</span><span class="unit">m</span></div>
    </div>
  </div>
  <!-- Direction & Elevation -->
  <div class="direction-row">
    <div class="compass-badge" id="directionDisplay">🧭 N 0°</div>
    <div class="elev-badge" id="elevationDisplay">🏔️ -- m</div>
  </div>
  <div class="status-area">
    <span id="statusMessage">📍 Press START — allow motion & GPS</span>
    <span id="cheatWarning" class="warning-tag"></span>
  </div>
  <div class="controls">
    <button class="btn" id="startBtn">▶ START</button>
    <button class="btn stop" id="stopBtn" disabled>⏹ STOP</button>
    <button class="btn reset" id="resetBtn">🔄 RESET</button>
  </div>
  <div style="font-size:0.7rem; padding:0 16px 12px; color:#7daf9b;">
    ⚡ Steps via accelerometer · anti‑swing · heading shows movement direction
  </div>
</div>

<script>
  (() => {
    // ----- DOM elements -----
    const mapEl = document.getElementById('map');
    const stepsDisplay = document.getElementById('stepsDisplay');
    const distanceDisplay = document.getElementById('distanceDisplay');
    const gainDisplay = document.getElementById('gainDisplay');
    const elevationDisplay = document.getElementById('elevationDisplay');
    const directionDisplay = document.getElementById('directionDisplay');
    const statusMessage = document.getElementById('statusMessage');
    const cheatWarning = document.getElementById('cheatWarning');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const resetBtn = document.getElementById('resetBtn');

    // ----- Map & tracking -----
    let map;
    let routePolyline;
    let currentMarker;
    let headingMarker; // direction arrow
    let watchId = null;
    let trackingActive = false;
    
    // Data
    let positions = [];           // {lat, lng, alt, timestamp}
    let totalDistance = 0;
    let elevationGain = 0;
    let lastAltitude = null;
    let stepCount = 0;
    
    // Heading / direction
    let currentHeading = 0;       // 0-360 degrees (true north from deviceorientation)
    let compassHeading = 0;
    let lastMovementHeading = 0;  // derived from GPS movement
    
    // ----- Step detection (advanced anti-cheat) -----
    let stepDetectionActive = false;
    let accelBuffer = [];          // circular buffer for filtered values
    const BUFFER_SIZE = 15;
    // Filter coefficients
    const ALPHA = 0.15;           // low-pass filter for gravity estimation
    let gravityX = 0, gravityY = 0, gravityZ = 0;
    // Step detection state
    let stepLastTimestamp = 0;
    const MIN_STEP_INTERVAL = 280; // ms
    const MAX_STEP_INTERVAL = 1200;
    let stepDynamicThreshold = 0.8; // base threshold (m/s²) will adapt
    let lastPeakValue = 0;
    let lastPeakTime = 0;
    let stepLock = false;
    let possibleCheatCount = 0;
    const CHEAT_RESET_THRESHOLD = 6; // if too many rapid swings, reset steps
    
    // ----- Initialize Map -----
    function initMap() {
      map = L.map('map', { attributionControl: true, zoomControl: true }).setView([39.5, -98.0], 13);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap', maxZoom: 19
      }).addTo(map);
      
      routePolyline = L.polyline([], { color: '#f5c542', weight: 6, opacity: 0.9 }).addTo(map);
      
      // Current position marker
      currentMarker = L.marker([0,0], {
        icon: L.divIcon({
          className: 'pos-marker',
          html: '<div style="background:#2a9df4; width:16px; height:16px; border-radius:50%; border:3px solid white; box-shadow:0 0 10px #1e90ff;"></div>',
          iconSize: [22,22], iconAnchor: [11,11]
        })
      }).addTo(map);
      
      // Direction arrow marker (rotated via CSS)
      headingMarker = L.marker([0,0], {
        icon: L.divIcon({
          className: 'heading-arrow',
          html: '<div id="arrowDiv" style="width:0; height:0; border-left:10px solid transparent; border-right:10px solid transparent; border-bottom:22px solid #ffb347; transform-origin:50% 100%; filter:drop-shadow(0 2px 3px black);"></div>',
          iconSize: [24, 30], iconAnchor: [12, 28]
        })
      }).addTo(map);
    }
    
    // Update arrow rotation
    function updateHeadingOnMap(headingDeg) {
      const arrow = document.getElementById('arrowDiv');
      if (arrow) arrow.style.transform = `rotate(${headingDeg}deg)`;
    }
    
    // Direction from deviceorientation (compass) or GPS movement
    function updateDirectionDisplay(heading) {
      const directions = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
      const idx = Math.round(heading / 45) % 8;
      directionDisplay.textContent = `🧭 ${directions[idx]} ${Math.round(heading)}°`;
    }

    // ----- Geospatial helpers -----
    function haversine(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2-lat1)*Math.PI/180;
      const dLon = (lon2-lon1)*Math.PI/180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
    
    function bearing(lat1, lon1, lat2, lon2) {
      const φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180;
      const Δλ = (lon2-lon1) * Math.PI/180;
      const y = Math.sin(Δλ) * Math.cos(φ2);
      const x = Math.cos(φ1)*Math.sin(φ2) - Math.sin(φ1)*Math.cos(φ2)*Math.cos(Δλ);
      const θ = Math.atan2(y, x);
      return (θ*180/Math.PI + 360) % 360;
    }

    // ----- Process GPS position -----
    function processPosition(pos) {
      const crd = pos.coords;
      const lat = crd.latitude, lng = crd.longitude;
      const alt = (crd.altitude !== null && crd.altitude !== undefined) ? crd.altitude : null;
      const ts = pos.timestamp || Date.now();
      
      // Update map view & markers
      map.setView([lat, lng], map.getZoom());
      currentMarker.setLatLng([lat, lng]);
      headingMarker.setLatLng([lat, lng]);
      
      // Add to polyline
      routePolyline.addLatLng([lat, lng]);
      
      // Distance & elevation gain
      if (positions.length > 0) {
        const prev = positions[positions.length-1];
        const segDist = haversine(prev.lat, prev.lng, lat, lng);
        if (segDist > 0.002) {
          totalDistance += segDist;
          // Compute movement heading from GPS (more reliable for direction)
          const moveHeading = bearing(prev.lat, prev.lng, lat, lng);
          lastMovementHeading = moveHeading;
          updateHeadingOnMap(moveHeading);
          updateDirectionDisplay(moveHeading);
        }
        if (lastAltitude !== null && alt !== null) {
          const diff = alt - lastAltitude;
          if (diff > 0.3 && diff < 60) elevationGain += diff;
        }
      } else {
        // first point: use compass if available
        if (compassHeading) updateHeadingOnMap(compassHeading);
      }
      
      positions.push({ lat, lng, alt, timestamp: ts });
      if (alt !== null) lastAltitude = alt;
      
      updateUI();
      statusMessage.textContent = '📍 Live tracking';
    }
    
    function geoError(err) {
      let msg = 'GPS weak';
      if (err.code === 1) msg = '📍 Location denied';
      else if (err.code === 2) msg = '📍 Signal unavailable';
      statusMessage.textContent = msg;
    }

    // ----- Step detection (advanced, anti-swing) -----
    function initStepDetection() {
      window.addEventListener('devicemotion', handleMotion);
    }
    
    function handleMotion(event) {
      if (!stepDetectionActive || !trackingActive) return;
      
      const acc = event.accelerationIncludingGravity;
      if (!acc) return;
      const { x, y, z } = acc;
      
      // Low-pass filter to isolate gravity
      gravityX = ALPHA * x + (1 - ALPHA) * gravityX;
      gravityY = ALPHA * y + (1 - ALPHA) * gravityY;
      gravityZ = ALPHA * z + (1 - ALPHA) * gravityZ;
      
      // Linear acceleration (dynamic part)
      const linX = x - gravityX;
      const linY = y - gravityY;
      const linZ = z - gravityZ;
      
      // Use vertical component approx: we assume device roughly upright. 
      // Better: use magnitude of linear accel, but we want vertical movement.
      // We'll use the norm of linear acceleration.
      const mag = Math.sqrt(linX*linX + linY*linY + linZ*linZ);
      
      // Add to buffer for smoothing
      accelBuffer.push(mag);
      if (accelBuffer.length > BUFFER_SIZE) accelBuffer.shift();
      
      // Compute smoothed value (moving average)
      const smoothed = accelBuffer.reduce((a,b) => a+b, 0) / accelBuffer.length;
      
      const now = Date.now();
      
      // Adaptive threshold (based on recent peaks)
      if (smoothed > stepDynamicThreshold && !stepLock) {
        const timeSinceLast = now - lastPeakTime;
        
        // Anti-cheat: if too many fast swings (< 200ms) increment cheat counter
        if (timeSinceLast < 200) {
          possibleCheatCount++;
          cheatWarning.textContent = `⚠️ swing detected (${possibleCheatCount}/${CHEAT_RESET_THRESHOLD})`;
          if (possibleCheatCount >= CHEAT_RESET_THRESHOLD) {
            // Reset steps due to cheating
            stepCount = 0;
            possibleCheatCount = 0;
            cheatWarning.textContent = '❌ Steps reset (cheating)';
            updateUI();
            setTimeout(() => cheatWarning.textContent = '', 2000);
          }
          stepLock = true;
          setTimeout(() => stepLock = false, 250);
          return;
        } else {
          // legitimate step condition
          if (timeSinceLast > MIN_STEP_INTERVAL && timeSinceLast < MAX_STEP_INTERVAL) {
            stepCount++;
            lastPeakTime = now;
            lastPeakValue = smoothed;
            // Slowly adapt threshold
            stepDynamicThreshold = 0.7 * stepDynamicThreshold + 0.3 * (smoothed * 0.55);
            // Reset cheat count on valid step
            possibleCheatCount = Math.max(0, possibleCheatCount-1);
            cheatWarning.textContent = '';
            updateUI();
          } else if (timeSinceLast >= MAX_STEP_INTERVAL) {
            // long pause, still consider step but adjust
            stepCount++;
            lastPeakTime = now;
            lastPeakValue = smoothed;
            possibleCheatCount = Math.max(0, possibleCheatCount-1);
            updateUI();
          }
          stepLock = true;
          setTimeout(() => stepLock = false, 220);
        }
      }
      
      // If no movement for a while, reset cheat counter slowly
      if (now - lastPeakTime > 3000) possibleCheatCount = 0;
    }
    
    // Device orientation for compass heading (when not moving)
    function handleOrientation(event) {
      if (!trackingActive) return;
      let heading;
      if (event.webkitCompassHeading) heading = event.webkitCompassHeading;
      else if (event.absolute && event.alpha !== null) heading = 360 - event.alpha; // alpha is compass
      else return;
      
      compassHeading = heading;
      // Only update direction if we haven't moved recently (use GPS heading when moving)
      if (positions.length === 0 || (Date.now() - positions[positions.length-1].timestamp > 5000)) {
        updateHeadingOnMap(heading);
        updateDirectionDisplay(heading);
      }
    }

    // ----- UI update -----
    function updateUI() {
      stepsDisplay.textContent = stepCount;
      distanceDisplay.textContent = totalDistance.toFixed(2);
      gainDisplay.textContent = Math.round(elevationGain);
      if (positions.length > 0) {
        const alt = positions[positions.length-1].alt;
        elevationDisplay.textContent = alt !== null ? `🏔️ ${Math.round(alt)} m` : '🏔️ -- m';
      }
    }

    // ----- Tracking control -----
    async function startTracking() {
      if (trackingActive) return;
      
      // Request motion/orientation permissions (iOS)
      if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
        try {
          await DeviceMotionEvent.requestPermission();
        } catch(e) { /* ignore */ }
      }
      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        try {
          await DeviceOrientationEvent.requestPermission();
        } catch(e) {}
      }
      
      // Geolocation
      if (!navigator.geolocation) { alert('Geolocation not supported'); return; }
      
      watchId = navigator.geolocation.watchPosition(processPosition, geoError, {
        enableHighAccuracy: true, maximumAge: 8000, timeout: 12000
      });
      
      trackingActive = true;
      stepDetectionActive = true;
      window.addEventListener('deviceorientation', handleOrientation, true);
      statusMessage.textContent = '👣 Tracking · Steps & GPS active';
      startBtn.disabled = true;
      stopBtn.disabled = false;
    }
    
    function stopTracking() {
      if (watchId) { navigator.geolocation.clearWatch(watchId); watchId = null; }
      trackingActive = false;
      stepDetectionActive = false;
      window.removeEventListener('deviceorientation', handleOrientation);
      statusMessage.textContent = '⏸️ Paused';
      startBtn.disabled = false;
      stopBtn.disabled = true;
    }
    
    function resetAll() {
      stopTracking();
      positions = [];
      totalDistance = 0;
      stepCount = 0;
      elevationGain = 0;
      lastAltitude = null;
      routePolyline.setLatLngs([]);
      possibleCheatCount = 0;
      cheatWarning.textContent = '';
      // Reset step detector state
      accelBuffer = [];
      stepLastTimestamp = 0; lastPeakTime = 0;
      updateUI();
      elevationDisplay.textContent = '🏔️ -- m';
      directionDisplay.textContent = '🧭 N 0°';
      statusMessage.textContent = '🔄 Reset · Press START';
    }

    // ----- Init -----
    initMap();
    initStepDetection();
    updateUI();
    
    startBtn.addEventListener('click', startTracking);
    stopBtn.addEventListener('click', stopTracking);
    resetBtn.addEventListener('click', resetAll);
    
    // Cleanup
    window.addEventListener('beforeunload', () => {
      if (watchId) navigator.geolocation.clearWatch(watchId);
      window.removeEventListener('devicemotion', handleMotion);
      window.removeEventListener('deviceorientation', handleOrientation);
    });
  })();
</script>
</body>
</html>
