<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Cảnh báo dùng điện thoại qua Webcam</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #1e1e2f;
      color: #eee;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      box-sizing: border-box;
    }
    h1 {
      font-weight: 400;
      margin-bottom: 0.3em;
      text-align: center;
      color: #ffb86c;
    }
    .sub {
      color: #aaa;
      margin-bottom: 1.5em;
      text-align: center;
    }
    .container {
      display: flex;
      flex-wrap: wrap;
      gap: 25px;
      justify-content: center;
      align-items: flex-start;
      width: 100%;
      max-width: 1100px;
    }
    .video-panel {
      background: #2a2a3c;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    video, canvas {
      width: 100%;
      max-width: 500px;
      border-radius: 12px;
      background: #000;
      display: block;
    }
    canvas {
      position: absolute;
      top: 0;
      left: 0;
    }
    .video-wrapper {
      position: relative;
      display: inline-block;
      border-radius: 12px;
      overflow: hidden;
      line-height: 0;
    }
    .controls {
      margin-top: 20px;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
    }
    button {
      background: #4a4a6a;
      border: none;
      color: white;
      padding: 12px 28px;
      border-radius: 30px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 600;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.4);
    }
    button:hover {
      background: #5e5e86;
      transform: translateY(-2px);
    }
    button:active {
      transform: translateY(1px);
    }
    button.active {
      background: #ff5555;
      color: white;
      box-shadow: 0 0 15px #ff5555aa;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .status-panel {
      background: #2a2a3c;
      border-radius: 20px;
      padding: 20px;
      max-width: 320px;
      width: 100%;
      box-shadow: 0 15px 30px rgba(0,0,0,0.5);
      align-self: stretch;
    }
    .status-panel h2 {
      margin-top: 0;
      font-weight: 400;
      color: #ffb86c;
      border-bottom: 1px solid #444;
      padding-bottom: 10px;
    }
    .detection-list {
      list-style: none;
      padding: 0;
      margin: 15px 0;
      max-height: 280px;
      overflow-y: auto;
    }
    .detection-list li {
      background: #3a3a52;
      margin-bottom: 8px;
      padding: 10px 14px;
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 500;
    }
    .badge {
      background: #ffb86c;
      color: #1e1e2f;
      border-radius: 20px;
      padding: 2px 12px;
      font-weight: bold;
      font-size: 0.9rem;
    }
    .alert-message {
      background: #ff555522;
      border-left: 4px solid #ff5555;
      padding: 12px;
      border-radius: 8px;
      margin: 10px 0;
      color: #ff8888;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .alert-message::before {
      content: "⚠️";
      font-size: 1.3rem;
    }
    .hidden {
      display: none;
    }
    .note {
      font-size: 0.8rem;
      color: #999;
      margin-top: 10px;
    }
    @media (max-width: 700px) {
      .container {
        flex-direction: column;
        align-items: center;
      }
      video, canvas {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <h1>📵 Cảnh báo dùng điện thoại</h1>
  <p class="sub">Trang web sẽ phát âm thanh khi phát hiện bạn đang cầm điện thoại trước webcam</p>

  <div class="container">
    <div class="video-panel">
      <div class="video-wrapper">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
      </div>
      <div class="controls">
        <button id="startBtn" title="Bật camera và bắt đầu phát hiện">
          <span>📷</span> Bật camera
        </button>
        <button id="stopBtn" disabled title="Dừng camera và phát hiện">
          <span>⏹️</span> Dừng
        </button>
      </div>
      <p class="note">* Cho phép trình duyệt sử dụng webcam khi được hỏi.</p>
    </div>

    <div class="status-panel">
      <h2>📊 Trạng thái</h2>
      <div id="statusText">Đang chờ bật camera...</div>
      <div id="alertBox" class="alert-message hidden">
        <span>PHÁT HIỆN ĐIỆN THOẠI!</span>
      </div>
      <strong>Vật thể phát hiện:</strong>
      <ul id="detectionList" class="detection-list">
        <li>Chưa có dữ liệu</li>
      </ul>
      <p class="note">Mô hình COCO-SSD, nhãn "cell phone".</p>
    </div>
  </div>

  <!-- Thư viện TensorFlow.js và COCO-SSD -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>

  <script>
    (function() {
      // --- Các phần tử DOM ---
      const video = document.getElementById('webcam');
      const canvas = document.getElementById('overlay');
      const ctx = canvas.getContext('2d');
      const startBtn = document.getElementById('startBtn');
      const stopBtn = document.getElementById('stopBtn');
      const statusDiv = document.getElementById('statusText');
      const alertBox = document.getElementById('alertBox');
      const detectionList = document.getElementById('detectionList');

      // --- Biến trạng thái ---
      let model = null;
      let stream = null;
      let isRunning = false;
      let animationFrameId = null;
      let lastDetectionTime = 0;
      const DETECT_INTERVAL_MS = 400; // Thời gian giữa các lần dự đoán (ms)
      
      // Cảnh báo âm thanh: tránh phát liên tục
      let lastAlertTime = 0;
      const ALERT_COOLDOWN_MS = 2500; // Khoảng cách tối thiểu giữa hai lần cảnh báo (ms)
      let audioCtx = null; // AudioContext dùng chung

      // --- Khởi tạo AudioContext (cần sau tương tác người dùng) ---
      function getAudioContext() {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        // Resume nếu bị treo (trình duyệt yêu cầu)
        if (audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
        return audioCtx;
      }

      // --- Phát âm thanh cảnh báo (tiếng bíp ngắn) ---
      function playAlertSound() {
        try {
          const ctx = getAudioContext();
          const now = ctx.currentTime;
          
          // Tạo oscillator (sóng vuông cho âm thanh dễ nghe)
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          
          osc.type = 'square';
          osc.frequency.setValueAtTime(800, now); // Tần số 800Hz
          osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1); // Lên cao
          osc.frequency.exponentialRampToValueAtTime(600, now + 0.3); // Xuống thấp
          
          gain.gain.setValueAtTime(0.15, now); // Âm lượng vừa phải
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
          
          osc.connect(gain);
          gain.connect(ctx.destination);
          
          osc.start(now);
          osc.stop(now + 0.4);
        } catch (e) {
          console.warn('Không thể phát âm thanh:', e);
        }
      }

      // --- Cập nhật danh sách phát hiện lên UI ---
      function updateDetectionList(predictions) {
        // Xóa danh sách cũ
        detectionList.innerHTML = '';
        
        if (!predictions || predictions.length === 0) {
          detectionList.innerHTML = '<li>Không phát hiện vật thể</li>';
          return;
        }
        
        // Hiển thị tối đa 5 vật thể có điểm cao nhất
        const sorted = [...predictions].sort((a, b) => b.score - a.score);
        const top5 = sorted.slice(0, 5);
        
        top5.forEach(pred => {
          const li = document.createElement('li');
          const className = pred.class === 'cell phone' ? '📱 ' + pred.class : pred.class;
          li.innerHTML = `
            <span>${className}</span>
            <span class="badge">${Math.round(pred.score * 100)}%</span>
          `;
          // Tô màu nổi bật nếu là cell phone
          if (pred.class === 'cell phone') {
            li.style.background = '#ff555533';
            li.style.borderLeft = '4px solid #ff5555';
          }
          detectionList.appendChild(li);
        });
      }

      // --- Vẽ khung và nhãn lên canvas ---
      function drawPredictions(predictions) {
        // Đồng bộ kích thước canvas với video
        if (video.videoWidth && video.videoHeight) {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
        }
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        if (!predictions) return;
        
        // Font cho nhãn
        ctx.font = '16px "Segoe UI", sans-serif';
        ctx.lineWidth = 3;
        
        predictions.forEach(pred => {
          const [x, y, width, height] = pred.bbox;
          const isPhone = pred.class === 'cell phone';
          
          // Màu sắc: đỏ cho điện thoại, xanh dương cho các thứ khác
          ctx.strokeStyle = isPhone ? '#ff3333' : '#4da6ff';
          ctx.fillStyle = isPhone ? 'rgba(255, 50, 50, 0.2)' : 'rgba(77, 166, 255, 0.15)';
          
          // Vẽ hình chữ nhật
          ctx.beginPath();
          ctx.rect(x, y, width, height);
          ctx.fill();
          ctx.stroke();
          
          // Nhãn
          const label = `${pred.class} (${Math.round(pred.score * 100)}%)`;
          ctx.fillStyle = isPhone ? '#ff3333' : '#ffffff';
          ctx.shadowColor = '#000';
          ctx.shadowBlur = 4;
          ctx.fillText(label, x + 5, y > 20 ? y - 8 : y + 20);
          ctx.shadowBlur = 0;
          ctx.shadowColor = 'transparent';
        });
      }

      // --- Kiểm tra và kích hoạt cảnh báo nếu có điện thoại ---
      function checkForPhoneAlert(predictions) {
        if (!predictions) return;
        
        const phoneDetected = predictions.some(pred => 
          pred.class === 'cell phone' && pred.score > 0.55
        );
        
        const now = Date.now();
        
        if (phoneDetected) {
          // Hiển thị hộp cảnh báo
          alertBox.classList.remove('hidden');
          
          // Phát âm thanh nếu đủ thời gian cooldown
          if (now - lastAlertTime > ALERT_COOLDOWN_MS) {
            playAlertSound();
            lastAlertTime = now;
          }
        } else {
          alertBox.classList.add('hidden');
        }
      }

      // --- Vòng lặp phát hiện (gọi model.detect) ---
      async function detectionLoop() {
        if (!isRunning || !model || !stream) {
          return;
        }
        
        try {
          const now = Date.now();
          // Chỉ thực hiện phát hiện mỗi DETECT_INTERVAL_MS để giảm tải
          if (now - lastDetectionTime >= DETECT_INTERVAL_MS) {
            // Đảm bảo video đã sẵn sàng
            if (video.readyState === 4) {
              const predictions = await model.detect(video);
              lastDetectionTime = now;
              
              // Vẽ và cập nhật UI
              drawPredictions(predictions);
              updateDetectionList(predictions);
              checkForPhoneAlert(predictions);
            }
          }
        } catch (error) {
          console.error('Lỗi phát hiện:', error);
          statusDiv.textContent = '⚠️ Lỗi phát hiện, đang thử lại...';
        }
        
        // Tiếp tục vòng lặp
        animationFrameId = requestAnimationFrame(detectionLoop);
      }

      // --- Dừng camera và dọn dẹp ---
      function stopCamera() {
        // Dừng vòng lặp
        if (animationFrameId) {
          cancelAnimationFrame(animationFrameId);
          animationFrameId = null;
        }
        
        // Dừng tất cả track của stream
        if (stream) {
          stream.getTracks().forEach(track => track.stop());
          stream = null;
        }
        
        // Tắt video
        video.srcObject = null;
        
        // Xóa canvas
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Reset trạng thái
        isRunning = false;
        startBtn.disabled = false;
        stopBtn.disabled = true;
        startBtn.classList.remove('active');
        alertBox.classList.add('hidden');
        statusDiv.textContent = 'Đã dừng camera.';
        detectionList.innerHTML = '<li>Chưa có dữ liệu</li>';
      }

      // --- Bắt đầu camera và khởi động phát hiện ---
      async function startCamera() {
        // Nếu đang chạy thì không làm gì
        if (isRunning) return;
        
        // Cập nhật giao diện
        startBtn.disabled = true;
        stopBtn.disabled = false;
        startBtn.classList.add('active');
        statusDiv.textContent = 'Đang yêu cầu quyền truy cập webcam...';
        
        try {
          // Yêu cầu webcam
          stream = await navigator.mediaDevices.getUserMedia({ 
            video: { 
              width: { ideal: 640 },
              height: { ideal: 480 },
              facingMode: 'user' // Camera trước (có thể đổi thành 'environment' nếu muốn)
            } 
          });
          
          video.srcObject = stream;
          
          // Đợi video sẵn sàng
          await new Promise((resolve) => {
            video.onloadedmetadata = () => {
              resolve();
            };
          });
          
          await video.play();
          
          // Đảm bảo model đã được tải
          if (!model) {
            statusDiv.textContent = 'Đang tải mô hình COCO-SSD...';
            model = await cocoSsd.load({
              base: 'mobilenet_v2' // Nhẹ hơn, nhanh hơn
            });
            statusDiv.textContent = 'Đã tải mô hình. Bắt đầu phát hiện...';
          }
          
          isRunning = true;
          lastDetectionTime = 0;
          lastAlertTime = 0;
          statusDiv.textContent = '🟢 Đang giám sát...';
          
          // Bắt đầu vòng lặp phát hiện
          detectionLoop();
          
        } catch (error) {
          console.error('Lỗi truy cập webcam:', error);
          statusDiv.textContent = '❌ Không thể truy cập webcam. Hãy kiểm tra quyền.';
          startBtn.disabled = false;
          stopBtn.disabled = true;
          startBtn.classList.remove('active');
          // Nếu stream đã được tạo một phần thì dừng
          if (stream) {
            stream.getTracks().forEach(t => t.stop());
            stream = null;
          }
        }
      }

      // --- Gán sự kiện cho các nút ---
      startBtn.addEventListener('click', startCamera);
      stopBtn.addEventListener('click', stopCamera);

      // --- Dọn dẹp khi rời trang ---
      window.addEventListener('beforeunload', () => {
        stopCamera();
      });

      // --- Khởi tạo: tải trước model để sẵn sàng (nhưng không bắt buộc) ---
      // Có thể tải ngầm khi trang load, nhưng phải đợi người dùng click rồi mới dùng.
      // Để tránh tải quá sớm, ta sẽ tải model khi người dùng bấm "Bật camera".
      // Nhưng để có trải nghiệm nhanh hơn, ta tải model ngay khi trang load (không ảnh hưởng webcam).
      (async function preloadModel() {
        try {
          statusDiv.textContent = 'Đang tải mô hình nhận diện... (có thể mất vài giây)';
          model = await cocoSsd.load({ base: 'mobilenet_v2' });
          statusDiv.textContent = 'Sẵn sàng! Nhấn "Bật camera" để bắt đầu.';
        } catch (e) {
          console.warn('Không thể tải trước model:', e);
          statusDiv.textContent = 'Lỗi tải mô hình. Vui lòng thử lại.';
        }
      })();

      // Đảm bảo AudioContext được phép khởi tạo sau tương tác (click start sẽ kích hoạt)
      // Thêm sự kiện click toàn cục để mở khóa AudioContext nếu cần
      document.body.addEventListener('click', () => {
        if (audioCtx && audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
      }, { once: false });

    })();
  </script>
</body>
</html>
