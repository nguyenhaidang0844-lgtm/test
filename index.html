<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>✨ Trail Luxe · Steps & Distance Synced · Strava‑like Map</title>
  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at 20% 30%, #0f2c24, #05100c);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100dvh;
      margin: 0;
      padding: 8px;
    }

    .app-container {
      max-width: 500px;
      width: 100%;
      background: rgba(20, 45, 38, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 48px;
      box-shadow: 0 25px 40px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(80, 160, 130, 0.3) inset, 0 0 30px rgba(0, 255, 180, 0.2);
      color: #edfff7;
      display: flex;
      flex-direction: column;
      height: 95dvh;
      max-height: 860px;
      overflow: hidden;
      border: 1px solid rgba(120, 220, 180, 0.3);
      transition: all 0.2s ease;
    }

    .header {
      padding: 20px 20px 10px;
      text-align: center;
      border-bottom: 1px solid rgba(90, 200, 160, 0.3);
    }

    .header h1 {
      font-weight: 500;
      font-size: 1.9rem;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-shadow: 0 4px 15px #0a2b20;
      background: linear-gradient(135deg, #f0fff0, #b3ffe0);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .map-wrapper {
      flex: 2.5;
      min-height: 220px;
      background: #1a3f32;
      margin: 14px 16px;
      border-radius: 32px;
      overflow: hidden;
      border: 2px solid rgba(80, 200, 150, 0.5);
      box-shadow: 0 12px 0 #0b241c, inset 0 0 0 1px #2a6a54, 0 0 20px #1f9a7a;
    }

    #map {
      width: 100%;
      height: 100%;
      background: #b5dfcf;
    }

    .stats-panel {
      display: flex;
      justify-content: space-around;
      padding: 14px 8px;
      margin: 0 16px 12px;
      background: rgba(18, 55, 45, 0.7);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      border-radius: 60px;
      border: 1px solid rgba(80, 200, 150, 0.4);
      box-shadow: inset 0 4px 6px rgba(0,0,0,0.2), 0 8px 0 #0c231c;
    }

    .stat-card {
      text-align: center;
      flex: 1;
    }

    .stat-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #b0e6d4;
      font-weight: 400;
      text-shadow: 0 2px 5px #03100b;
    }

    .stat-value {
      font-size: 2.4rem;
      font-weight: 800;
      line-height: 1.1;
      color: #f5fff0;
      text-shadow: 0 4px 10px #0f3125, 0 0 15px #64d4b0;
    }

    .stat-unit {
      font-size: 0.8rem;
      color: #c0f0df;
      margin-left: 4px;
    }

    .info-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 18px 10px;
    }

    .direction-chip {
      background: rgba(30, 70, 55, 0.7);
      backdrop-filter: blur(4px);
      padding: 8px 18px;
      border-radius: 40px;
      border: 1px solid #6dcfae;
      font-weight: 600;
      font-size: 1.1rem;
      box-shadow: inset 0 2px 3px #1d4638, 0 4px 0 #0a251d;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .elevation-chip {
      background: rgba(30, 70, 55, 0.7);
      backdrop-filter: blur(4px);
      padding: 8px 18px;
      border-radius: 40px;
      border: 1px solid #6dcfae;
      font-weight: 600;
      font-size: 1.1rem;
      box-shadow: inset 0 2px 3px #1d4638, 0 4px 0 #0a251d;
    }

    .stride-badge {
      text-align: center;
      font-size: 0.8rem;
      padding: 4px 0 2px;
      color: #b2efda;
      letter-spacing: 0.5px;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      padding: 0 20px 8px;
      font-size: 0.75rem;
      color: #c1e6d8;
    }

    .controls {
      display: flex;
      gap: 12px;
      padding: 10px 18px 22px;
      justify-content: center;
    }

    .btn {
      background: linear-gradient(145deg, #287a60, #1a5e48);
      border: none;
      border-bottom: 5px solid #0b3326;
      color: white;
      font-weight: bold;
      font-size: 1.3rem;
      padding: 14px 18px;
      min-width: 110px;
      border-radius: 60px;
      cursor: pointer;
      box-shadow: 0 8px 0 #0a1f16, 0 4px 12px black;
      transition: all 0.08s;
      text-transform: uppercase;
      letter-spacing: 2px;
      flex: 1;
      backdrop-filter: blur(5px);
      text-shadow: 0 2px 3px #0e2f22;
    }

    .btn:active {
      transform: translateY(4px);
      box-shadow: 0 4px 0 #0a1f16, 0 2px 8px black;
    }

    .btn:disabled {
      opacity: 0.6;
      transform: none;
      box-shadow: 0 5px 0 #0a1f16;
      pointer-events: none;
    }

    .btn.stop {
      background: linear-gradient(145deg, #8f5a5a, #6e4242);
      border-bottom-color: #3b2626;
    }

    .btn.reset {
      background: linear-gradient(145deg, #4a637a, #314a5e);
      border-bottom-color: #1e2e3c;
    }

    .warning-tag {
      color: #ffcd94;
      font-weight: 500;
      text-shadow: 0 0 5px #a05e00;
    }

    .leaflet-control-attribution {
      font-size: 8px;
      background: rgba(10, 30, 20, 0.7) !important;
      color: #b0ddcc !important;
    }

    .leaflet-container {
      font-family: inherit;
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="header">
    <h1>
      <span>✨ TRAIL LUXE</span>
      <span style="font-weight:200;">·</span>
      <span>🏆 SYNC</span>
    </h1>
  </div>

  <div class="map-wrapper">
    <div id="map"></div>
  </div>

  <!-- Stats -->
  <div class="stats-panel">
    <div class="stat-card">
      <div class="stat-label">👟 STEPS</div>
      <div class="stat-value" id="stepsDisplay">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">📏 DIST</div>
      <div class="stat-value"><span id="distanceDisplay">0.00</span><span class="stat-unit">km</span></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">📈 GAIN</div>
      <div class="stat-value"><span id="gainDisplay">0</span><span class="stat-unit">m</span></div>
    </div>
  </div>

  <!-- Direction & Elevation -->
  <div class="info-bar">
    <div class="direction-chip" id="directionDisplay">
      <span>🧭</span> <span id="dirText">N 0°</span>
    </div>
    <div class="elevation-chip" id="elevationDisplay">🏔️ -- m</div>
  </div>

  <div class="stride-badge" id="strideInfo">👣 Stride: 0.75m (calibrating...)</div>

  <div class="status-row">
    <span id="statusMessage">📍 Press START · allow motion & GPS</span>
    <span id="cheatWarning" class="warning-tag"></span>
  </div>

  <div class="controls">
    <button class="btn" id="startBtn">▶ START</button>
    <button class="btn stop" id="stopBtn" disabled>⏹ STOP</button>
    <button class="btn reset" id="resetBtn">🔄 RESET</button>
  </div>
</div>

<script>
  (() => {
    // ----- DOM -----
    const stepsDisplay = document.getElementById('stepsDisplay');
    const distanceDisplay = document.getElementById('distanceDisplay');
    const gainDisplay = document.getElementById('gainDisplay');
    const elevationDisplay = document.getElementById('elevationDisplay');
    const dirText = document.getElementById('dirText');
    const statusMessage = document.getElementById('statusMessage');
    const cheatWarning = document.getElementById('cheatWarning');
    const strideInfo = document.getElementById('strideInfo');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const resetBtn = document.getElementById('resetBtn');

    // ----- Map -----
    let map;
    let routePolyline;
    let currentMarker;
    let headingMarker;
    let watchId = null;
    let trackingActive = false;
    
    // Data
    let positions = [];            // GPS points (filtered)
    let totalDistance = 0;         // km (from steps + GPS sync)
    let elevationGain = 0;
    let lastAltitude = null;
    let stepCount = 0;
    
    // Heading
    let deviceHeading = 0;
    let hasCompass = false;
    
    // Stride & sync
    let strideLengthM = 0.75;       // meters per step
    let strideCalibrated = false;
    let gpsDistanceSinceLastCalib = 0;
    let stepsSinceLastCalib = 0;
    
    // Dead reckoning (indoor)
    let lastDRPosition = null;      // {lat, lng}
    let deadReckoningActive = false;
    let lastGoodGPS = null;
    const GPS_ACCURACY_THRESHOLD = 25;
    
    // Step detection (relaxed anti-cheat)
    let stepActive = false;
    const ALPHA = 0.15;
    let gravityX=0, gravityY=0, gravityZ=0;
    let accelBuffer = [];
    const BUFFER_SIZE = 12;
    let stepTimestamps = [];
    const CADENCE_WINDOW = 5;
    const MIN_CADENCE_MS = 250;     // slightly wider
    const MAX_CADENCE_MS = 1300;
    let stepLock = false;
    let lastPeakTime = 0;
    let stepThreshold = 0.82;
    let swingCounter = 0;
    const SWING_WARN = 8;           // only warn, don't reset steps
    
    // Auto-zoom
    let bounds;

    // ----- Map init -----
    function initMap() {
      map = L.map('map', { 
        attributionControl: true, 
        zoomControl: true,
        zoomSnap: 0.2,
        zoomDelta: 0.5
      }).setView([39.5, -98.0], 14);
      
      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>, &copy; CartoDB',
        subdomains: 'abcd',
        maxZoom: 20
      }).addTo(map);
      
      routePolyline = L.polyline([], { 
        color: '#ffd966', 
        weight: 6, 
        opacity: 0.95,
        lineCap: 'round',
        lineJoin: 'round',
        smoothFactor: 1.5
      }).addTo(map);
      
      currentMarker = L.marker([0,0], {
        icon: L.divIcon({
          className: 'pos-marker',
          html: '<div style="background: radial-gradient(circle, #6ef0c0, #1e9bff); width:18px; height:18px; border-radius:50%; border:3px solid white; box-shadow:0 0 20px #2ad4ff, 0 2px 8px black;"></div>',
          iconSize: [26,26], iconAnchor: [13,13]
        })
      }).addTo(map);
      
      headingMarker = L.marker([0,0], {
        icon: L.divIcon({
          className: 'heading-arrow',
          html: '<div id="arrowDiv" style="width:0; height:0; border-left:12px solid transparent; border-right:12px solid transparent; border-bottom:28px solid #ffd966; transform-origin:50% 100%; filter:drop-shadow(0 4px 6px black);"></div>',
          iconSize: [30, 36], iconAnchor: [15, 34]
        })
      }).addTo(map);
    }

    function updateHeading(headingDeg) {
      const arrow = document.getElementById('arrowDiv');
      if (arrow) arrow.style.transform = `rotate(${headingDeg}deg)`;
      const dirs = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
      const idx = Math.round(headingDeg / 45) % 8;
      dirText.textContent = `${dirs[idx]} ${Math.round(headingDeg)}°`;
    }

    function fitMapToRoute() {
      if (routePolyline.getLatLngs().length > 0) {
        map.fitBounds(routePolyline.getBounds(), { padding: [50, 50], maxZoom: 17 });
      }
    }

    // ----- Geo helpers -----
    function haversine(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2-lat1)*Math.PI/180;
      const dLon = (lon2-lon1)*Math.PI/180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
    
    function bearing(lat1, lon1, lat2, lon2) {
      const φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180;
      const Δλ = (lon2-lon1) * Math.PI/180;
      const y = Math.sin(Δλ) * Math.cos(φ2);
      const x = Math.cos(φ1)*Math.sin(φ2) - Math.sin(φ1)*Math.cos(φ2)*Math.cos(Δλ);
      return (Math.atan2(y, x)*180/Math.PI + 360) % 360;
    }
    
    function destination(lat, lon, distKm, brngDeg) {
      const R = 6371;
      const δ = distKm / R;
      const θ = brngDeg * Math.PI / 180;
      const φ1 = lat * Math.PI / 180;
      const λ1 = lon * Math.PI / 180;
      const φ2 = Math.asin(Math.sin(φ1)*Math.cos(δ) + Math.cos(φ1)*Math.sin(δ)*Math.cos(θ));
      const λ2 = λ1 + Math.atan2(Math.sin(θ)*Math.sin(δ)*Math.cos(φ1), Math.cos(δ)-Math.sin(φ1)*Math.sin(φ2));
      return { lat: φ2*180/Math.PI, lng: λ2*180/Math.PI };
    }

    // ----- Sync distance from steps (always keep logical) -----
    function syncDistanceFromSteps() {
      // total distance = stepCount * strideLengthM / 1000 (km)
      const stepDistKm = stepCount * strideLengthM / 1000;
      // Only override if GPS not overriding or to keep consistency
      if (!trackingActive) return;
      // We'll let GPS calibrate, but distance always reflects steps when no GPS.
    }

    // ----- GPS processing (with speed filter) -----
    function processGPS(pos) {
      const crd = pos.coords;
      const accuracy = crd.accuracy;
      const lat = crd.latitude, lng = crd.longitude;
      const alt = (crd.altitude !== null) ? crd.altitude : null;
      const ts = Date.now();
      const isGood = (accuracy <= GPS_ACCURACY_THRESHOLD);
      
      // Update marker and view
      currentMarker.setLatLng([lat, lng]);
      headingMarker.setLatLng([lat, lng]);
      map.setView([lat, lng], map.getZoom());
      
      let gpsDistAdded = 0;
      if (positions.length > 0) {
        const prev = positions[positions.length-1];
        const distKm = haversine(prev.lat, prev.lng, lat, lng);
        const timeSec = (ts - prev.timestamp)/1000;
        const speedMps = timeSec>0.5 ? (distKm*1000)/timeSec : 0;
        
        // Anti-vehicle: ignore speed > 8 m/s (28.8 km/h)
        if (speedMps <= 8.0) {
          if (isGood) {
            totalDistance += distKm;
            gpsDistAdded = distKm;
            if (lastAltitude !== null && alt !== null) {
              const diff = alt - lastAltitude;
              if (diff > 0.3 && diff < 60) elevationGain += diff;
            }
          }
          routePolyline.addLatLng([lat, lng]);
        } else {
          cheatWarning.textContent = '🚗 Vehicle speed ignored';
          routePolyline.addLatLng([lat, lng]); // still show route
        }
      } else {
        routePolyline.addLatLng([lat, lng]);
      }
      
      positions.push({ lat, lng, alt, timestamp: ts, accuracy });
      if (alt !== null) lastAltitude = alt;
      
      // Update dead reckoning base
      if (isGood) {
        lastGoodGPS = { lat, lng, timestamp: ts };
        deadReckoningActive = false;
        statusMessage.textContent = '📍 GPS tracking';
        
        // Stride calibration: if we have steps and good GPS distance
        if (gpsDistAdded > 0.01 && stepCount > 5) {
          gpsDistanceSinceLastCalib += gpsDistAdded;
          stepsSinceLastCalib = stepCount; // use total steps
          const stepBasedDist = stepCount * strideLengthM / 1000;
          const ratio = gpsDistanceSinceLastCalib / stepBasedDist;
          if (ratio > 0.6 && ratio < 1.8) {
            strideLengthM = strideLengthM * 0.7 + (gpsDistanceSinceLastCalib * 1000 / stepCount) * 0.3;
            strideCalibrated = true;
            strideInfo.textContent = `👣 Stride: ${strideLengthM.toFixed(2)}m (calibrated)`;
          }
          gpsDistanceSinceLastCalib = 0; // reset window
        }
      } else {
        if (!deadReckoningActive && lastGoodGPS) {
          deadReckoningActive = true;
          lastDRPosition = { ...lastGoodGPS };
        }
        statusMessage.textContent = '📡 GPS weak · using step dead reckoning';
      }
      
      fitMapToRoute();
      updateUI();
    }

    function geoError(err) {
      statusMessage.textContent = '⚠️ GPS error · using dead reckoning';
      if (!deadReckoningActive && lastGoodGPS) {
        deadReckoningActive = true;
        lastDRPosition = { ...lastGoodGPS };
      }
    }

    // ----- Compass -----
    function handleOrientation(event) {
      if (!trackingActive) return;
      let heading = null;
      if (event.webkitCompassHeading) heading = event.webkitCompassHeading;
      else if (event.absolute && event.alpha !== null) heading = 360 - event.alpha;
      if (heading !== null) {
        deviceHeading = heading;
        updateHeading(deviceHeading);
      }
    }

    // ----- Dead reckoning on step -----
    function applyDeadReckoning() {
      if (!deadReckoningActive || !lastDRPosition) return;
      const stepDistKm = strideLengthM / 1000;
      const newPos = destination(lastDRPosition.lat, lastDRPosition.lng, stepDistKm, deviceHeading);
      lastDRPosition = newPos;
      routePolyline.addLatLng([newPos.lat, newPos.lng]);
      currentMarker.setLatLng([newPos.lat, newPos.lng]);
      headingMarker.setLatLng([newPos.lat, newPos.lng]);
      map.setView([newPos.lat, newPos.lng], map.getZoom());
      totalDistance += stepDistKm;
      fitMapToRoute();
    }

    // ----- Step detection (relaxed, anti-swing warning only) -----
    function handleMotion(event) {
      if (!stepActive || !trackingActive) return;
      const acc = event.accelerationIncludingGravity;
      if (!acc) return;
      const { x, y, z } = acc;
      
      gravityX = ALPHA * x + (1-ALPHA)*gravityX;
      gravityY = ALPHA * y + (1-ALPHA)*gravityY;
      gravityZ = ALPHA * z + (1-ALPHA)*gravityZ;
      
      const linX = x - gravityX;
      const linY = y - gravityY;
      const linZ = z - gravityZ;
      const mag = Math.sqrt(linX*linX + linY*linY + linZ*linZ);
      
      accelBuffer.push(mag);
      if (accelBuffer.length > BUFFER_SIZE) accelBuffer.shift();
      const smoothed = accelBuffer.reduce((a,b)=>a+b,0) / accelBuffer.length;
      
      const now = Date.now();
      
      if (smoothed > stepThreshold && !stepLock) {
        const timeSince = now - lastPeakTime;
        
        if (timeSince < 200) {
          swingCounter++;
          if (swingCounter > SWING_WARN) {
            cheatWarning.textContent = '⚠️ Swing detected (ignored)';
          }
        } else {
          // Cadence validation (relaxed)
          stepTimestamps.push(now);
          if (stepTimestamps.length > CADENCE_WINDOW) stepTimestamps.shift();
          let valid = true;
          if (stepTimestamps.length >= 3) {
            const intervals = [];
            for (let i=1; i<stepTimestamps.length; i++) intervals.push(stepTimestamps[i]-stepTimestamps[i-1]);
            const avg = intervals.reduce((a,b)=>a+b,0)/intervals.length;
            valid = intervals.every(iv => iv >= MIN_CADENCE_MS && iv <= MAX_CADENCE_MS) &&
                    intervals.every(iv => Math.abs(iv-avg) < 220); // more forgiving
          }
          
          if (valid) {
            stepCount++;
            lastPeakTime = now;
            stepThreshold = 0.7*stepThreshold + 0.3*(smoothed*0.55);
            swingCounter = Math.max(0, swingCounter-1);
            if (swingCounter === 0) cheatWarning.textContent = '';
            
            // Distance sync: if dead reckoning active, project; else rely on GPS
            if (deadReckoningActive) {
              applyDeadReckoning();
            } else {
              // Keep distance synced: but GPS will update separately.
              // For consistency, we can update totalDistance based on steps if no recent GPS.
              // But we'll let GPS dominate when good.
            }
            updateUI();
          } else {
            // ignore irregular cadence
          }
        }
        stepLock = true;
        setTimeout(() => stepLock = false, 200);
      }
      
      if (now - lastPeakTime > 3000) {
        swingCounter = 0;
        stepTimestamps = [];
      }
    }

    // ----- UI update -----
    function updateUI() {
      stepsDisplay.textContent = stepCount;
      // Show distance from totalDistance (GPS + DR)
      distanceDisplay.textContent = totalDistance.toFixed(2);
      gainDisplay.textContent = Math.round(elevationGain);
      if (positions.length > 0) {
        const alt = positions[positions.length-1].alt;
        elevationDisplay.textContent = alt !== null ? `🏔️ ${Math.round(alt)} m` : '🏔️ -- m';
      }
    }

    // ----- Controls -----
    async function startTracking() {
      if (trackingActive) return;
      if (typeof DeviceMotionEvent?.requestPermission === 'function') {
        try { await DeviceMotionEvent.requestPermission(); } catch(e){}
      }
      if (typeof DeviceOrientationEvent?.requestPermission === 'function') {
        try { await DeviceOrientationEvent.requestPermission(); } catch(e){}
      }
      if (!navigator.geolocation) { alert('Geolocation not supported'); return; }
      
      watchId = navigator.geolocation.watchPosition(processGPS, geoError, {
        enableHighAccuracy: true, maximumAge: 5000, timeout: 10000
      });
      
      trackingActive = true;
      stepActive = true;
      window.addEventListener('deviceorientation', handleOrientation, true);
      window.addEventListener('devicemotion', handleMotion);
      
      statusMessage.textContent = '✨ Live · steps & distance synced';
      startBtn.disabled = true;
      stopBtn.disabled = false;
    }
    
    function stopTracking() {
      if (watchId) { navigator.geolocation.clearWatch(watchId); watchId = null; }
      trackingActive = false;
      stepActive = false;
      window.removeEventListener('deviceorientation', handleOrientation);
      window.removeEventListener('devicemotion', handleMotion);
      statusMessage.textContent = '⏸️ Paused';
      startBtn.disabled = false;
      stopBtn.disabled = true;
      deadReckoningActive = false;
    }
    
    function resetAll() {
      stopTracking();
      positions = [];
      totalDistance = 0;
      stepCount = 0;
      elevationGain = 0;
      lastAltitude = null;
      routePolyline.setLatLngs([]);
      swingCounter = 0;
      cheatWarning.textContent = '';
      stepTimestamps = [];
      deadReckoningActive = false;
      lastGoodGPS = null;
      strideLengthM = 0.75;
      strideCalibrated = false;
      gpsDistanceSinceLastCalib = 0;
      updateUI();
      elevationDisplay.textContent = '🏔️ -- m';
      updateHeading(deviceHeading || 0);
      strideInfo.textContent = `👣 Stride: 0.75m (calibrating...)`;
      statusMessage.textContent = '🔄 Reset · Press START';
      map.setView([39.5, -98.0], 14);
    }

    // ----- Init -----
    initMap();
    updateUI();
    updateHeading(0);
    
    startBtn.addEventListener('click', startTracking);
    stopBtn.addEventListener('click', stopTracking);
    resetBtn.addEventListener('click', resetAll);
    
    window.addEventListener('beforeunload', () => {
      if (watchId) navigator.geolocation.clearWatch(watchId);
    });
  })();
</script>
</body>
</html>
