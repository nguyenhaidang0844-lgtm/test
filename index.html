<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>☀️ Bước Chân · Đồng bộ · Chống gian lận</title>
  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(145deg, #f0f9f5 0%, #d4efe5 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100dvh;
      padding: 12px;
    }

    .app-container {
      max-width: 500px;
      width: 100%;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 44px;
      box-shadow: 0 30px 50px rgba(0, 40, 30, 0.15), 0 0 0 1px rgba(80, 180, 140, 0.3) inset, 0 0 30px rgba(40, 200, 150, 0.2);
      color: #1a3e32;
      display: flex;
      flex-direction: column;
      height: 94dvh;
      max-height: 860px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.6);
    }

    .header {
      padding: 24px 20px 10px;
      text-align: center;
    }

    .header h1 {
      font-weight: 600;
      font-size: 2.1rem;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: linear-gradient(135deg, #0f5c45, #1f9a7a);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 2px 10px rgba(30, 150, 110, 0.2);
    }

    .map-wrapper {
      flex: 2.5;
      min-height: 220px;
      background: #c2ecd9;
      margin: 14px 16px;
      border-radius: 36px;
      overflow: hidden;
      border: 3px solid white;
      box-shadow: 0 12px 20px -8px rgba(20, 80, 60, 0.2), inset 0 0 0 1px rgba(60, 170, 130, 0.3);
    }

    #map {
      width: 100%;
      height: 100%;
      background: #d9f0e5;
    }

    .stats-panel {
      display: flex;
      justify-content: space-around;
      padding: 14px 8px;
      margin: 0 16px 12px;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 60px;
      border: 1px solid rgba(255, 255, 255, 0.9);
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.02), 0 10px 15px -8px rgba(30, 80, 60, 0.2);
    }

    .stat-card {
      text-align: center;
      flex: 1;
    }

    .stat-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #2a6b58;
      font-weight: 500;
    }

    .stat-value {
      font-size: 2.5rem;
      font-weight: 700;
      line-height: 1.1;
      color: #0c382c;
      text-shadow: 0 2px 10px rgba(40, 150, 110, 0.2);
    }

    .stat-unit {
      font-size: 0.8rem;
      color: #2e7d64;
      margin-left: 4px;
      font-weight: 500;
    }

    .info-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 18px 10px;
    }

    .direction-chip {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(4px);
      padding: 10px 20px;
      border-radius: 40px;
      border: 1px solid #ffffff;
      font-weight: 600;
      font-size: 1.1rem;
      box-shadow: 0 6px 12px -6px rgba(20, 80, 60, 0.15);
      display: flex;
      align-items: center;
      gap: 8px;
      color: #1b5e46;
    }

    .elevation-chip {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(4px);
      padding: 10px 20px;
      border-radius: 40px;
      border: 1px solid #ffffff;
      font-weight: 600;
      font-size: 1.1rem;
      box-shadow: 0 6px 12px -6px rgba(20, 80, 60, 0.15);
      color: #1b5e46;
    }

    .stride-badge {
      text-align: center;
      font-size: 0.8rem;
      padding: 4px 0 2px;
      color: #1e6e58;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      padding: 0 20px 8px;
      font-size: 0.75rem;
      color: #2d6b58;
    }

    .controls {
      display: flex;
      gap: 12px;
      padding: 10px 18px 22px;
      justify-content: center;
    }

    .btn {
      background: #ffffffd6;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-bottom: 4px solid #1c6b53;
      color: #145b46;
      font-weight: 700;
      font-size: 1.3rem;
      padding: 14px 18px;
      min-width: 110px;
      border-radius: 60px;
      cursor: pointer;
      box-shadow: 0 10px 20px -8px rgba(20, 80, 60, 0.2), 0 4px 8px rgba(0,0,0,0.02);
      transition: all 0.1s ease;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      flex: 1;
    }

    .btn:active {
      transform: translateY(4px);
      box-shadow: 0 4px 10px -4px rgba(20, 80, 60, 0.2);
      border-bottom-width: 2px;
    }

    .btn:disabled {
      opacity: 0.5;
      transform: none;
      box-shadow: 0 6px 12px -8px rgba(0,0,0,0.1);
      pointer-events: none;
    }

    .btn.stop {
      border-bottom-color: #9e5e5e;
      color: #7a4444;
    }

    .btn.reset {
      border-bottom-color: #4f6f8a;
      color: #365573;
    }

    .warning-tag {
      color: #c45d2c;
      font-weight: 600;
    }

    .leaflet-control-attribution {
      font-size: 8px;
      background: rgba(255,255,255,0.8) !important;
      color: #286b55 !important;
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="header">
    <h1>
      <span>☀️ BƯỚC CHÂN</span>
      <span style="font-weight:300;">·</span>
      <span>📏 ĐỒNG BỘ</span>
    </h1>
  </div>

  <div class="map-wrapper">
    <div id="map"></div>
  </div>

  <!-- Thống kê -->
  <div class="stats-panel">
    <div class="stat-card">
      <div class="stat-label">👟 BƯỚC</div>
      <div class="stat-value" id="stepsDisplay">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">📏 KHOẢNG CÁCH</div>
      <div class="stat-value"><span id="distanceDisplay">0.00</span><span class="stat-unit">km</span></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">📈 ĐỘ CAO</div>
      <div class="stat-value"><span id="gainDisplay">0</span><span class="stat-unit">m</span></div>
    </div>
  </div>

  <!-- Hướng & Độ cao -->
  <div class="info-bar">
    <div class="direction-chip" id="directionDisplay">
      <span>🧭</span> <span id="dirText">B 0°</span>
    </div>
    <div class="elevation-chip" id="elevationDisplay">🏔️ -- m</div>
  </div>

  <div class="stride-badge" id="strideInfo">👣 Sải chân: 0.75m (đang hiệu chỉnh...)</div>

  <div class="status-row">
    <span id="statusMessage">📍 Nhấn BẮT ĐẦU · cho phép chuyển động & GPS</span>
    <span id="cheatWarning" class="warning-tag"></span>
  </div>

  <div class="controls">
    <button class="btn" id="startBtn">▶ BẮT ĐẦU</button>
    <button class="btn stop" id="stopBtn" disabled>⏹ DỪNG</button>
    <button class="btn reset" id="resetBtn">🔄 ĐẶT LẠI</button>
  </div>
</div>

<script>
  (() => {
    // ----- DOM -----
    const stepsDisplay = document.getElementById('stepsDisplay');
    const distanceDisplay = document.getElementById('distanceDisplay');
    const gainDisplay = document.getElementById('gainDisplay');
    const elevationDisplay = document.getElementById('elevationDisplay');
    const dirText = document.getElementById('dirText');
    const statusMessage = document.getElementById('statusMessage');
    const cheatWarning = document.getElementById('cheatWarning');
    const strideInfo = document.getElementById('strideInfo');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const resetBtn = document.getElementById('resetBtn');

    // ----- Bản đồ -----
    let map;
    let routePolyline;
    let currentMarker;
    let headingMarker;
    let watchId = null;
    let trackingActive = false;
    
    // Dữ liệu
    let positions = [];            // Các điểm GPS (đã lọc)
    let totalDistance = 0;         // km (từ bước chân + GPS)
    let elevationGain = 0;
    let lastAltitude = null;
    let stepCount = 0;
    
    // Hướng
    let deviceHeading = 0;
    
    // Sải chân & đồng bộ
    let strideLengthM = 0.75;       // mét mỗi bước
    let strideCalibrated = false;
    let gpsCalibrationDistance = 0;
    let stepsForCalibration = 0;
    
    // Dead reckoning (trong nhà)
    let lastDRPosition = null;      // {lat, lng}
    let deadReckoningActive = false;
    let lastGoodGPS = null;
    const GPS_ACCURACY_THRESHOLD = 25;
    
    // Phát hiện bước chân (chống lắc / jiggle)
    let stepActive = false;
    const ALPHA = 0.15;
    let gravityX = 0, gravityY = 0, gravityZ = 0;
    let accelBuffer = [];
    const BUFFER_SIZE = 12;
    let stepTimestamps = [];
    const CADENCE_WINDOW = 6;
    const MIN_CADENCE_MS = 280;     // ~214 bước/phút
    const MAX_CADENCE_MS = 1100;
    let stepLock = false;
    let lastStepTime = 0;
    let stepThreshold = 0.82;
    let swingCheatCount = 0;
    const SWING_RESET_THRESHOLD = 5; // reset bước nếu lắc quá nhiều
    
    // Auto-zoom
    function fitMapToRoute() {
      if (routePolyline.getLatLngs().length > 0) {
        map.fitBounds(routePolyline.getBounds(), { padding: [60, 60], maxZoom: 18 });
      }
    }

    // ----- Khởi tạo bản đồ -----
    function initMap() {
      map = L.map('map', { 
        attributionControl: true, 
        zoomControl: true,
        zoomSnap: 0.2,
        zoomDelta: 0.5
      }).setView([21.0285, 105.8542], 14); // Hà Nội làm mặc định
      
      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>, &copy; CartoDB',
        subdomains: 'abcd',
        maxZoom: 20
      }).addTo(map);
      
      routePolyline = L.polyline([], { 
        color: '#1e9b7a', 
        weight: 7, 
        opacity: 0.9,
        lineCap: 'round',
        lineJoin: 'round',
        smoothFactor: 1.5
      }).addTo(map);
      
      currentMarker = L.marker([0,0], {
        icon: L.divIcon({
          className: 'pos-marker',
          html: '<div style="background: radial-gradient(circle, #3de0b0, #0f9b7a); width:20px; height:20px; border-radius:50%; border:3px solid white; box-shadow:0 0 20px #1ccf9e, 0 4px 10px rgba(0,0,0,0.1);"></div>',
          iconSize: [30,30], iconAnchor: [15,15]
        })
      }).addTo(map);
      
      headingMarker = L.marker([0,0], {
        icon: L.divIcon({
          className: 'heading-arrow',
          html: '<div id="arrowDiv" style="width:0; height:0; border-left:12px solid transparent; border-right:12px solid transparent; border-bottom:30px solid #1e9b7a; transform-origin:50% 100%; filter:drop-shadow(0 6px 8px rgba(0,40,20,0.2));"></div>',
          iconSize: [32, 40], iconAnchor: [16, 38]
        })
      }).addTo(map);
    }

    function updateHeading(headingDeg) {
      const arrow = document.getElementById('arrowDiv');
      if (arrow) arrow.style.transform = `rotate(${headingDeg}deg)`;
      const dirs = ['B', 'ĐB', 'Đ', 'ĐN', 'N', 'TN', 'T', 'TB'];
      const idx = Math.round(headingDeg / 45) % 8;
      dirText.textContent = `${dirs[idx]} ${Math.round(headingDeg)}°`;
    }

    // ----- Công cụ địa lý -----
    function haversine(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2-lat1)*Math.PI/180;
      const dLon = (lon2-lon1)*Math.PI/180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
    
    function destination(lat, lon, distKm, brngDeg) {
      const R = 6371;
      const δ = distKm / R;
      const θ = brngDeg * Math.PI / 180;
      const φ1 = lat * Math.PI / 180;
      const λ1 = lon * Math.PI / 180;
      const φ2 = Math.asin(Math.sin(φ1)*Math.cos(δ) + Math.cos(φ1)*Math.sin(δ)*Math.cos(θ));
      const λ2 = λ1 + Math.atan2(Math.sin(θ)*Math.sin(δ)*Math.cos(φ1), Math.cos(δ)-Math.sin(φ1)*Math.sin(φ2));
      return { lat: φ2*180/Math.PI, lng: λ2*180/Math.PI };
    }

    // ----- Đồng bộ khoảng cách từ bước chân (luôn luôn) -----
    function syncDistanceFromSteps() {
      const stepDistKm = stepCount * strideLengthM / 1000;
      totalDistance = stepDistKm;
      distanceDisplay.textContent = totalDistance.toFixed(2);
    }

    // ----- Xử lý GPS (với bộ lọc tốc độ) -----
    function processGPS(pos) {
      const crd = pos.coords;
      const accuracy = crd.accuracy;
      const lat = crd.latitude, lng = crd.longitude;
      const alt = (crd.altitude !== null) ? crd.altitude : null;
      const ts = Date.now();
      const isGood = (accuracy <= GPS_ACCURACY_THRESHOLD);
      
      currentMarker.setLatLng([lat, lng]);
      headingMarker.setLatLng([lat, lng]);
      map.setView([lat, lng], map.getZoom());
      
      let gpsDistAdded = 0;
      if (positions.length > 0) {
        const prev = positions[positions.length-1];
        const distKm = haversine(prev.lat, prev.lng, lat, lng);
        const timeSec = (ts - prev.timestamp)/1000;
        const speedMps = timeSec > 0.5 ? (distKm*1000)/timeSec : 0;
        
        // Chống xe cộ: bỏ qua nếu tốc độ > 8 m/s (~28.8 km/h)
        if (speedMps <= 8.0) {
          if (isGood) {
            gpsDistAdded = distKm;
            // Hiệu chỉnh sải chân dựa trên GPS
            if (gpsDistAdded > 0.01 && stepCount > 5) {
              gpsCalibrationDistance += gpsDistAdded;
              stepsForCalibration = stepCount;
              const stepBasedDist = stepCount * strideLengthM / 1000;
              const ratio = gpsCalibrationDistance / stepBasedDist;
              if (ratio > 0.6 && ratio < 1.8) {
                strideLengthM = strideLengthM * 0.7 + (gpsCalibrationDistance * 1000 / stepCount) * 0.3;
                strideCalibrated = true;
                strideInfo.textContent = `👣 Sải chân: ${strideLengthM.toFixed(2)}m (đã hiệu chỉnh)`;
              }
              gpsCalibrationDistance = 0;
            }
            // Cập nhật độ cao
            if (lastAltitude !== null && alt !== null) {
              const diff = alt - lastAltitude;
              if (diff > 0.3 && diff < 60) elevationGain += diff;
            }
          }
          routePolyline.addLatLng([lat, lng]);
        } else {
          cheatWarning.textContent = '🚗 Tốc độ xe bị bỏ qua';
          routePolyline.addLatLng([lat, lng]); // vẫn hiển thị đường
        }
      } else {
        routePolyline.addLatLng([lat, lng]);
      }
      
      positions.push({ lat, lng, alt, timestamp: ts, accuracy });
      if (alt !== null) lastAltitude = alt;
      
      if (isGood) {
        lastGoodGPS = { lat, lng, timestamp: ts };
        deadReckoningActive = false;
        statusMessage.textContent = '📍 Đang theo dõi GPS';
      } else {
        if (!deadReckoningActive && lastGoodGPS) {
          deadReckoningActive = true;
          lastDRPosition = { ...lastGoodGPS };
        }
        statusMessage.textContent = '📡 GPS yếu · dùng bước chân định vị';
      }
      
      // Luôn đồng bộ khoảng cách với bước chân
      syncDistanceFromSteps();
      fitMapToRoute();
      updateUI();
    }

    function geoError(err) {
      statusMessage.textContent = '⚠️ Lỗi GPS · dùng bước chân';
      if (!deadReckoningActive && lastGoodGPS) {
        deadReckoningActive = true;
        lastDRPosition = { ...lastGoodGPS };
      }
    }

    // ----- La bàn -----
    function handleOrientation(event) {
      if (!trackingActive) return;
      let heading = null;
      if (event.webkitCompassHeading) heading = event.webkitCompassHeading;
      else if (event.absolute && event.alpha !== null) heading = 360 - event.alpha;
      if (heading !== null) {
        deviceHeading = heading;
        updateHeading(deviceHeading);
      }
    }

    // ----- Dead reckoning khi có bước chân -----
    function applyDeadReckoning() {
      if (!deadReckoningActive || !lastDRPosition) return;
      const stepDistKm = strideLengthM / 1000;
      const newPos = destination(lastDRPosition.lat, lastDRPosition.lng, stepDistKm, deviceHeading);
      lastDRPosition = newPos;
      routePolyline.addLatLng([newPos.lat, newPos.lng]);
      currentMarker.setLatLng([newPos.lat, newPos.lng]);
      headingMarker.setLatLng([newPos.lat, newPos.lng]);
      map.setView([newPos.lat, newPos.lng], map.getZoom());
      fitMapToRoute();
    }

    // ----- Phát hiện bước chân CHỐNG LẮC TRIỆT ĐỂ -----
    function handleMotion(event) {
      if (!stepActive || !trackingActive) return;
      const acc = event.accelerationIncludingGravity;
      if (!acc) return;
      const { x, y, z } = acc;
      
      gravityX = ALPHA * x + (1-ALPHA)*gravityX;
      gravityY = ALPHA * y + (1-ALPHA)*gravityY;
      gravityZ = ALPHA * z + (1-ALPHA)*gravityZ;
      
      const linX = x - gravityX;
      const linY = y - gravityY;
      const linZ = z - gravityZ;
      const mag = Math.sqrt(linX*linX + linY*linY + linZ*linZ);
      
      accelBuffer.push(mag);
      if (accelBuffer.length > BUFFER_SIZE) accelBuffer.shift();
      const smoothed = accelBuffer.reduce((a,b)=>a+b,0) / accelBuffer.length;
      
      const now = Date.now();
      
      if (smoothed > stepThreshold && !stepLock) {
        const timeSince = now - lastStepTime;
        
        // Phát hiện lắc nhanh (< 200ms) -> tăng bộ đếm gian lận
        if (timeSince < 200) {
          swingCheatCount++;
          cheatWarning.textContent = `⚠️ Lắc máy (${swingCheatCount}/${SWING_RESET_THRESHOLD})`;
          if (swingCheatCount >= SWING_RESET_THRESHOLD) {
            // Reset bước chân do gian lận
            stepCount = 0;
            swingCheatCount = 0;
            cheatWarning.textContent = '❌ Bước đã reset (gian lận)';
            syncDistanceFromSteps();
            updateUI();
            setTimeout(() => cheatWarning.textContent = '', 2500);
          }
        } else {
          // Kiểm tra nhịp điệu (cadence)
          stepTimestamps.push(now);
          if (stepTimestamps.length > CADENCE_WINDOW) stepTimestamps.shift();
          
          let validCadence = true;
          if (stepTimestamps.length >= 4) {
            const intervals = [];
            for (let i=1; i<stepTimestamps.length; i++) intervals.push(stepTimestamps[i]-stepTimestamps[i-1]);
            const avg = intervals.reduce((a,b)=>a+b,0)/intervals.length;
            // Yêu cầu nhịp đều và trong khoảng cho phép
            validCadence = intervals.every(iv => iv >= MIN_CADENCE_MS && iv <= MAX_CADENCE_MS) &&
                           intervals.every(iv => Math.abs(iv-avg) < 200);
          }
          
          if (validCadence) {
            stepCount++;
            lastStepTime = now;
            stepThreshold = 0.7*stepThreshold + 0.3*(smoothed*0.55);
            swingCheatCount = Math.max(0, swingCheatCount-1);
            if (swingCheatCount === 0) cheatWarning.textContent = '';
            
            // Đồng bộ khoảng cách ngay lập tức
            syncDistanceFromSteps();
            
            // Nếu đang ở chế độ dead reckoning, cập nhật vị trí ảo
            if (deadReckoningActive) {
              applyDeadReckoning();
            }
            
            updateUI();
          } else {
            // Nhịp không đều -> bỏ qua nhưng không reset
          }
        }
        stepLock = true;
        setTimeout(() => stepLock = false, 200);
      }
      
      // Nếu không có bước trong 3 giây, reset bộ đếm lắc
      if (now - lastStepTime > 3000) {
        swingCheatCount = 0;
        stepTimestamps = [];
      }
    }

    // ----- Cập nhật UI -----
    function updateUI() {
      stepsDisplay.textContent = stepCount;
      distanceDisplay.textContent = totalDistance.toFixed(2);
      gainDisplay.textContent = Math.round(elevationGain);
      if (positions.length > 0) {
        const alt = positions[positions.length-1].alt;
        elevationDisplay.textContent = alt !== null ? `🏔️ ${Math.round(alt)} m` : '🏔️ -- m';
      }
    }

    // ----- Điều khiển -----
    async function startTracking() {
      if (trackingActive) return;
      
      if (typeof DeviceMotionEvent?.requestPermission === 'function') {
        try { await DeviceMotionEvent.requestPermission(); } catch(e){}
      }
      if (typeof DeviceOrientationEvent?.requestPermission === 'function') {
        try { await DeviceOrientationEvent.requestPermission(); } catch(e){}
      }
      
      if (!navigator.geolocation) { alert('Trình duyệt không hỗ trợ GPS'); return; }
      
      watchId = navigator.geolocation.watchPosition(processGPS, geoError, {
        enableHighAccuracy: true, maximumAge: 5000, timeout: 10000
      });
      
      trackingActive = true;
      stepActive = true;
      window.addEventListener('deviceorientation', handleOrientation, true);
      window.addEventListener('devicemotion', handleMotion);
      
      statusMessage.textContent = '☀️ Đang theo dõi · bước và khoảng cách đồng bộ';
      startBtn.disabled = true;
      stopBtn.disabled = false;
    }
    
    function stopTracking() {
      if (watchId) { navigator.geolocation.clearWatch(watchId); watchId = null; }
      trackingActive = false;
      stepActive = false;
      window.removeEventListener('deviceorientation', handleOrientation);
      window.removeEventListener('devicemotion', handleMotion);
      statusMessage.textContent = '⏸️ Đã tạm dừng';
      startBtn.disabled = false;
      stopBtn.disabled = true;
      deadReckoningActive = false;
    }
    
    function resetAll() {
      stopTracking();
      positions = [];
      totalDistance = 0;
      stepCount = 0;
      elevationGain = 0;
      lastAltitude = null;
      routePolyline.setLatLngs([]);
      swingCheatCount = 0;
      cheatWarning.textContent = '';
      stepTimestamps = [];
      deadReckoningActive = false;
      lastGoodGPS = null;
      strideLengthM = 0.75;
      strideCalibrated = false;
      gpsCalibrationDistance = 0;
      updateUI();
      elevationDisplay.textContent = '🏔️ -- m';
      updateHeading(deviceHeading || 0);
      strideInfo.textContent = `👣 Sải chân: 0.75m (đang hiệu chỉnh...)`;
      statusMessage.textContent = '🔄 Đã đặt lại · Nhấn BẮT ĐẦU';
      map.setView([21.0285, 105.8542], 14);
    }

    // ----- Khởi động -----
    initMap();
    updateUI();
    updateHeading(0);
    
    startBtn.addEventListener('click', startTracking);
    stopBtn.addEventListener('click', stopTracking);
    resetBtn.addEventListener('click', resetAll);
    
    window.addEventListener('beforeunload', () => {
      if (watchId) navigator.geolocation.clearWatch(watchId);
    });
  })();
</script>
</body>
</html>
