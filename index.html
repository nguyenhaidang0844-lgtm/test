<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🏃 VungTauGO! - Strava Style | La bàn + Chống gian lận</title>
  
  <!-- Leaflet CSS + JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  
  <!-- Font Awesome & Google Font -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0b0f15;
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px;
    }
    #app {
      width: 100%;
      max-width: 480px;
      background: #1a1f2b;
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      height: 780px;
      max-height: 95vh;
    }
    .header {
      padding: 20px 20px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .title {
      font-weight: 700;
      font-size: 20px;
      background: linear-gradient(135deg, #00e5ff, #007bff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .target-area {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .target-badge {
      background: #252c3b;
      padding: 10px 16px;
      border-radius: 40px;
      font-weight: 700;
      color: #fbbf24;
    }
    .random-btn {
      background: #ff6b00;
      color: white;
      border: none;
      border-radius: 30px;
      padding: 10px 16px;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 4px 8px rgba(249,115,22,0.3);
    }
    .stats-panel {
      display: flex;
      justify-content: space-around;
      padding: 15px 10px;
      background: #212838;
      margin: 8px 16px;
      border-radius: 28px;
    }
    .stat-item { text-align: center; }
    .stat-value {
      font-size: 34px;
      font-weight: 800;
      line-height: 1.2;
      color: #f0f9ff;
    }
    .stat-label {
      font-size: 12px;
      color: #8a9bb5;
      text-transform: uppercase;
    }
    .step-trust {
      font-size: 10px;
      margin-top: 2px;
      color: #4ade80;
    }
    .map-container {
      flex: 1;
      margin: 8px 16px;
      border-radius: 24px;
      overflow: hidden;
      border: 2px solid #2e3a4e;
      background: #1e2632;
      position: relative;
      min-height: 280px;
    }
    #map { width: 100%; height: 100%; z-index: 1; }
    .gps-status {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: rgba(0,0,0,0.7);
      color: #9cd49c;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      z-index: 1000;
      backdrop-filter: blur(4px);
      pointer-events: none;
    }
    .fusion-badge {
      position: absolute;
      bottom: 10px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      color: #fbbf24;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }
    .violation-toast {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: #dc2626;
      color: white;
      padding: 6px 12px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: bold;
      z-index: 1001;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .controls {
      display: flex;
      gap: 12px;
      padding: 20px 16px 25px;
      justify-content: center;
    }
    .ctrl-btn {
      flex: 1;
      padding: 16px 0;
      border: none;
      border-radius: 60px;
      font-weight: 700;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: 0.2s;
      background: #2d3748;
      color: #e2e8f0;
      border: 1px solid #3e4c61;
    }
    .ctrl-btn.primary {
      background: #007bff;
      color: white;
      border: none;
    }
    .ctrl-btn:disabled { opacity: 0.4; pointer-events: none; }
    
    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      visibility: hidden;
    }
    .modal-card {
      background: #1e293b;
      border-radius: 40px;
      padding: 30px 25px;
      max-width: 340px;
      width: 90%;
      text-align: center;
      border: 2px solid #fbbf24;
      box-shadow: 0 30px 40px #00000055;
    }
    .modal-icon { font-size: 64px; color: #fbbf24; margin-bottom: 15px; }
    .voucher-code {
      background: #0f172a;
      padding: 16px;
      border-radius: 20px;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 4px;
      color: #facc15;
      border: 2px dashed #fbbf24;
      margin: 20px 0;
    }
    .close-modal {
      background: #ff6b00;
      border: none;
      color: white;
      padding: 14px;
      width: 100%;
      border-radius: 40px;
      font-weight: bold;
      font-size: 18px;
      cursor: pointer;
    }
    .footnote {
      padding: 0 20px 15px;
      font-size: 12px;
      color: #7c8ba0;
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <span class="title"><i class="fas fa-shield-alt"></i> VungTauGO! Pro</span>
    <div class="target-area">
      <div class="target-badge" id="targetDisplay">🎲 0m</div>
      <button class="random-btn" id="randomTargetBtn"><i class="fas fa-dice"></i> MỤC TIÊU</button>
    </div>
  </div>
  
  <div class="stats-panel">
    <div class="stat-item">
      <div class="stat-value" id="distanceDisplay">0</div>
      <div class="stat-label">MÉT</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="stepsDisplay">0</div>
      <div class="stat-label">BƯỚC CHÂN</div>
      <div class="step-trust" id="stepTrustDisplay">✅ Hợp lệ</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="timerDisplay">00:00</div>
      <div class="stat-label">THỜI GIAN</div>
    </div>
  </div>
  
  <div class="map-container">
    <div id="map"></div>
    <div class="gps-status" id="gpsStatus">🛰️ Đang khởi tạo GPS...</div>
    <div class="fusion-badge" id="fusionBadge">⚖️ Chờ dữ liệu</div>
    <div class="violation-toast" id="violationToast"></div>
  </div>
  
  <div class="controls">
    <button class="ctrl-btn primary" id="startBtn"><i class="fas fa-play"></i> BẮT ĐẦU</button>
    <button class="ctrl-btn" id="pauseBtn" disabled><i class="fas fa-pause"></i> TẠM DỪNG</button>
    <button class="ctrl-btn" id="stopBtn" disabled><i class="fas fa-stop"></i> KẾT THÚC</button>
  </div>
  <div class="footnote">
    <span><i class="fas fa-route"></i> Cung đường màu theo tốc độ</span>
    <span>🚫 Gian lận → Trừ bước + mét</span>
  </div>
</div>

<!-- Modal voucher -->
<div class="modal-overlay" id="voucherModal">
  <div class="modal-card">
    <div class="modal-icon">🏆</div>
    <h2 style="margin-bottom: 8px;">Chúc mừng!</h2>
    <p style="margin-bottom: 5px;">Bạn đã hoàn thành mục tiêu</p>
    <div class="voucher-code" id="voucherCode">VTGO-ABC123</div>
    <p style="margin-bottom: 20px;">Mã giảm giá đặc biệt cho bạn</p>
    <button class="close-modal" id="closeModalBtn">TIẾP TỤC</button>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- CẤU HÌNH ----------
    const CONFIG = {
      kalman: { Q: 0.0005, R: 8, P: 1 },
      pedometer: {
        minStepInterval: 280,
        maxStepFreq: 4.5,
        threshold: 11.0,
        shakePenaltyThreshold: 18,
        maxShakeCount: 3,
        defaultStepLength: 0.75,
        stepLengthMin: 0.5,
        stepLengthMax: 1.4,
        calibrationSteps: 25,
        shakePenaltySteps: 2,
        shakePenaltyMeters: 1.2
      },
      gps: {
        minDistance: 0.001,
        maxSpeed: 2.8,
        vehicleSpeedThreshold: 4.8,
        maxJumpDistance: 0.018,
        goodAccuracy: 15,
        mediumAccuracy: 25,
        weakSignalThreshold: 30,
        jumpPenaltySteps: 3,
        jumpPenaltyMeters: 2.0
      },
      drift: {
        stationaryVariance: 0.8,
        minMovementSpeed: 0.4
      },
      sync: {
        maxStepDistanceError: 0.25,
        alpha: 0.7
      },
      compass: {
        enableInterpolation: true,
        smoothFactor: 0.3       // làm mượt hướng
      }
    };

    // ---------- STATE ----------
    let targetDistanceKm = 0.1;
    let currentDistanceKm = 0.0;
    let steps = 0;
    let isActive = false;
    let isPaused = false;
    let startTime = null;
    let elapsedSeconds = 0;
    let timerInterval = null;
    
    // GPS & Kalman
    let kalman = { lat: null, lng: null, vLat: 0, vLng: 0, P: CONFIG.kalman.P };
    let lastGpsTimestamp = null;
    let lastFusionTimestamp = null;
    let watchId = null;
    let lastValidPosition = null;
    let currentSpeed = 0;
    
    // Bước chân & đồng bộ
    let currentStepLength = CONFIG.pedometer.defaultStepLength;
    let stepsSinceLastGps = 0;
    let accStepsForCalib = 0;
    let accGpsDistForCalib = 0;
    let lastStepTime = 0;
    let shakeCounter = 0;
    let stepTrust = true;
    
    // Phát hiện chuyển động & la bàn
    let accHistory = [];
    let isMoving = false;
    let currentHeading = 0;          // độ (0-360), từ la bàn
    let lastHeading = 0;
    let headingTimestamp = 0;
    
    // Nội suy khi GPS yếu (dùng step + heading)
    let lastKnownLatLng = null;
    let lastInterpolationTime = 0;
    
    // Map & cung đường gradient
    let map;
    let userMarker;
    let pathPoints = [];     // {lat, lng, speed}
    let pathPolyline;
    
    // UI Elements
    const distanceEl = document.getElementById('distanceDisplay');
    const stepsEl = document.getElementById('stepsDisplay');
    const timerEl = document.getElementById('timerDisplay');
    const targetDisplay = document.getElementById('targetDisplay');
    const gpsStatusEl = document.getElementById('gpsStatus');
    const stepTrustDisplay = document.getElementById('stepTrustDisplay');
    const fusionBadge = document.getElementById('fusionBadge');
    const violationToast = document.getElementById('violationToast');
    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const stopBtn = document.getElementById('stopBtn');
    const randomTargetBtn = document.getElementById('randomTargetBtn');
    const modalOverlay = document.getElementById('voucherModal');
    const voucherCodeEl = document.getElementById('voucherCode');
    const closeModalBtn = document.getElementById('closeModalBtn');

    function showViolation(msg) {
      violationToast.textContent = msg;
      violationToast.style.opacity = '1';
      setTimeout(() => { violationToast.style.opacity = '0'; }, 2000);
    }

    function penalizeStepsAndDistance(stepPenalty, meterPenalty) {
      if (!isActive || isPaused) return;
      steps = Math.max(0, steps - stepPenalty);
      stepsSinceLastGps = Math.max(0, stepsSinceLastGps - stepPenalty);
      accStepsForCalib = Math.max(0, accStepsForCalib - stepPenalty);
      currentDistanceKm = Math.max(0, currentDistanceKm - (meterPenalty / 1000));
      updateUI();
      showViolation(`⚠️ Vi phạm: -${stepPenalty} bước, -${meterPenalty.toFixed(1)}m`);
      stepTrust = false;
      stepTrustDisplay.innerHTML = `⚠️ -${stepPenalty} bước`;
      stepTrustDisplay.style.color = '#f87171';
      setTimeout(() => {
        if (stepTrust) {
          stepTrustDisplay.innerHTML = '✅ Hợp lệ';
          stepTrustDisplay.style.color = '#4ade80';
        }
      }, 1500);
    }

    // Màu theo tốc độ (Strava style)
    function getColorForSpeed(speed) {
      if (speed === undefined) return '#00ff00';
      const maxSp = 5.0;
      const t = Math.min(1, speed / maxSp);
      const r = Math.floor(255 * t);
      const g = Math.floor(255 * (1 - t));
      const b = 0;
      return `rgb(${r}, ${g}, ${b})`;
    }

    function updateGradientPolyline() {
      if (!map || pathPoints.length < 2) return;
      if (pathPolyline) map.removeLayer(pathPolyline);
      const segments = [];
      for (let i = 0; i < pathPoints.length - 1; i++) {
        const p1 = pathPoints[i];
        const p2 = pathPoints[i+1];
        const speed = p1.speed || 0;
        const color = getColorForSpeed(speed);
        const segment = L.polyline([[p1.lat, p1.lng], [p2.lat, p2.lng]], {
          color: color,
          weight: 5,
          opacity: 0.8,
          smoothFactor: 1.0
        });
        segments.push(segment);
      }
      pathPolyline = L.layerGroup(segments);
      pathPolyline.addTo(map);
    }

    function addPathPoint(lat, lng, speed) {
      pathPoints.push({ lat, lng, speed: speed || currentSpeed });
      updateGradientPolyline();
    }

    function updateMarker(lat, lng) {
      if (!map) return;
      const iconHtml = '<div style="background:#ff3333; width:18px; height:18px; border-radius:50%; border:3px solid white; box-shadow:0 0 12px red;"></div>';
      if (userMarker) {
        userMarker.setLatLng([lat, lng]);
      } else {
        userMarker = L.marker([lat, lng], { icon: L.divIcon({className: 'custom-marker', html: iconHtml, iconSize: [24,24]}) }).addTo(map);
      }
      map.setView([lat, lng], map.getZoom());
    }

    // Nội suy vị trí dựa trên bước chân và hướng la bàn (khi GPS yếu)
    function interpolatePosition(startLat, startLng, distanceMeters, headingDeg) {
      const R = 6371000; // mét
      const rad = headingDeg * Math.PI / 180;
      const delta = distanceMeters / R;
      const lat1 = startLat * Math.PI / 180;
      const lng1 = startLng * Math.PI / 180;
      const lat2 = Math.asin(Math.sin(lat1) * Math.cos(delta) + Math.cos(lat1) * Math.sin(delta) * Math.cos(rad));
      const lng2 = lng1 + Math.atan2(Math.sin(rad) * Math.sin(delta) * Math.cos(lat1), Math.cos(delta) - Math.sin(lat1) * Math.sin(lat2));
      return { lat: lat2 * 180 / Math.PI, lng: lng2 * 180 / Math.PI };
    }

    // ---------- LA BÀN (DeviceOrientation) ----------
    function initCompass() {
      if (!window.DeviceOrientationEvent) return;
      if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        document.body.addEventListener('click', function requestOrientation() {
          DeviceOrientationEvent.requestPermission()
            .then(perm => {
              if (perm === 'granted') {
                window.addEventListener('deviceorientation', handleOrientation);
              }
            })
            .catch(console.error);
          document.body.removeEventListener('click', requestOrientation);
        }, { once: true });
      } else {
        window.addEventListener('deviceorientation', handleOrientation);
      }
    }

    function handleOrientation(event) {
      if (!isActive || isPaused) return;
      // Lấy góc heading (hướng bắc thật) từ alpha, beta, gamma (cần tính toán)
      // Trên iOS, webkitCompassHeading cho hướng tương đối bắc từ
      let heading = null;
      if (event.webkitCompassHeading !== undefined) {
        heading = event.webkitCompassHeading; // iOS
      } else if (event.alpha !== null) {
        heading = 360 - event.alpha;          // Android, alpha: hướng bắc từ
      }
      if (heading !== null) {
        const now = Date.now();
        // Làm mượt heading
        if (headingTimestamp === 0) {
          currentHeading = heading;
        } else {
          const dt = Math.min(0.5, (now - headingTimestamp) / 1000);
          const alpha = CONFIG.compass.smoothFactor;
          currentHeading = currentHeading * (1 - alpha) + heading * alpha;
        }
        headingTimestamp = now;
        lastHeading = currentHeading;
      }
    }

    // ---------- PEDOMETER & PHẠT ----------
    let motionHandlerAttached = false;
    
    function handleMotion(event) {
      if (!isActive || isPaused) return;
      const acc = event.accelerationIncludingGravity;
      if (!acc) return;
      const magnitude = Math.sqrt(acc.x*acc.x + acc.y*acc.y + acc.z*acc.z);
      const now = Date.now();
      
      accHistory.push(magnitude);
      if (accHistory.length > 10) accHistory.shift();
      if (accHistory.length >= 5) {
        const avg = accHistory.reduce((s, v) => s + v, 0) / accHistory.length;
        const variance = accHistory.reduce((s, v) => s + Math.pow(v - avg, 2), 0) / accHistory.length;
        isMoving = variance > CONFIG.drift.stationaryVariance;
      }
      
      // Lắc tay
      if (magnitude > CONFIG.pedometer.shakePenaltyThreshold) {
        shakeCounter++;
        if (shakeCounter >= CONFIG.pedometer.maxShakeCount) {
          penalizeStepsAndDistance(CONFIG.pedometer.shakePenaltySteps, CONFIG.pedometer.shakePenaltyMeters);
          shakeCounter = 0;
        }
        return;
      } else {
        shakeCounter = Math.max(0, shakeCounter - 1);
      }
      
      // Đếm bước
      if (magnitude > CONFIG.pedometer.threshold && (now - lastStepTime) > CONFIG.pedometer.minStepInterval) {
        const stepFreq = 1000 / (now - lastStepTime);
        const isVehicle = (currentSpeed > CONFIG.gps.vehicleSpeedThreshold);
        
        if (stepFreq <= CONFIG.pedometer.maxStepFreq) {
          steps++;
          stepsSinceLastGps++;
          accStepsForCalib++;
          lastStepTime = now;
          stepTrust = true;
          stepTrustDisplay.innerHTML = '✅ Hợp lệ';
          stepTrustDisplay.style.color = '#4ade80';
          shakeCounter = 0;
          
          // Cộng quãng đường dựa trên bước chân
          const stepDistKm = currentStepLength / 1000;
          currentDistanceKm += stepDistKm;
          
          // Nếu GPS yếu hoặc mất tín hiệu, dùng la bàn để nội suy điểm đường đi
          const lastGpsAge = lastGpsTimestamp ? (Date.now() - lastGpsTimestamp) : 9999;
          if (CONFIG.compass.enableInterpolation && lastGpsAge > 2000 && isMoving && lastKnownLatLng && currentHeading !== null) {
            const newPos = interpolatePosition(lastKnownLatLng.lat, lastKnownLatLng.lng, currentStepLength, currentHeading);
            lastKnownLatLng = newPos;
            addPathPoint(newPos.lat, newPos.lng, currentSpeed);
            updateMarker(newPos.lat, newPos.lng);
          }
          
          updateUI();
          if (currentDistanceKm >= targetDistanceKm) completeGoal();
        } else {
          if (isVehicle) {
            penalizeStepsAndDistance(1, 0.8);
            stepTrustDisplay.innerHTML = '🚫 Phương tiện!';
            showViolation('⚠️ Phát hiện phương tiện (bước quá nhanh)');
          } else {
            // Chạy bộ nhanh vẫn cộng
            steps++;
            stepsSinceLastGps++;
            accStepsForCalib++;
            lastStepTime = now;
            currentDistanceKm += currentStepLength / 1000;
            stepTrustDisplay.innerHTML = '🏃 Chạy nhanh';
            stepTrustDisplay.style.color = '#fbbf24';
          }
          updateUI();
          if (currentDistanceKm >= targetDistanceKm) completeGoal();
        }
      }
    }

    function requestMotionPermission() {
      if (motionHandlerAttached) return;
      if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
        DeviceMotionEvent.requestPermission()
          .then(perm => {
            if (perm === 'granted') {
              window.addEventListener('devicemotion', handleMotion);
              motionHandlerAttached = true;
            }
          })
          .catch(console.error);
      } else {
        window.addEventListener('devicemotion', handleMotion);
        motionHandlerAttached = true;
      }
    }

    // ---------- UTILS ----------
    function formatTime(sec) {
      const m = Math.floor(sec / 60).toString().padStart(2, '0');
      const s = Math.floor(sec % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }
    
    function haversine(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
    
    function updateUI() {
      distanceEl.textContent = Math.round(currentDistanceKm * 1000);
      stepsEl.textContent = steps;
      timerEl.textContent = formatTime(elapsedSeconds);
    }
    
    // ---------- GPS & ĐỒNG BỘ ----------
    function handlePosition(position) {
      const { latitude, longitude, accuracy, speed: gpsSpeed } = position.coords;
      const now = position.timestamp;
      lastGpsTimestamp = now;
      
      if (gpsSpeed !== null && !isNaN(gpsSpeed)) currentSpeed = gpsSpeed;
      
      // Kalman lọc
      let filteredLat = latitude, filteredLng = longitude;
      if (lastFusionTimestamp && kalman.lat !== null) {
        const dt = (now - lastFusionTimestamp) / 1000;
        if (dt > 0 && dt < 10) {
          let effAccuracy = accuracy;
          if (accuracy > CONFIG.gps.weakSignalThreshold) effAccuracy = 100;
          const filtered = kalmanUpdate(latitude, longitude, dt, effAccuracy);
          filteredLat = filtered.lat;
          filteredLng = filtered.lng;
        }
      }
      lastFusionTimestamp = now;
      
      if (accuracy > CONFIG.gps.weakSignalThreshold) {
        gpsStatusEl.innerHTML = `⚠️ GPS yếu (${Math.round(accuracy)}m)`;
        fusionBadge.innerHTML = '👟 Chỉ bước chân + la bàn';
        if (lastValidPosition) {
          updateMarker(filteredLat, filteredLng);
          addPathPoint(filteredLat, filteredLng, currentSpeed);
        }
        return;
      }
      
      gpsStatusEl.innerHTML = `🛰️ GPS ${Math.round(accuracy)}m ${currentSpeed > 0 ? `(${currentSpeed.toFixed(1)}m/s)` : ''}`;
      
      if (!lastValidPosition) {
        lastValidPosition = { lat: filteredLat, lng: filteredLng, timestamp: now };
        lastKnownLatLng = { lat: filteredLat, lng: filteredLng };
        updateMarker(filteredLat, filteredLng);
        addPathPoint(filteredLat, filteredLng, currentSpeed);
        return;
      }
      
      const distGPS = haversine(lastValidPosition.lat, lastValidPosition.lng, filteredLat, filteredLng);
      const timeDiff = (now - lastValidPosition.timestamp) / 1000;
      let valid = true;
      let speedGPS = 0;
      if (timeDiff > 0) speedGPS = distGPS / timeDiff;
      
      // Kiểm tra vi phạm
      if (speedGPS > CONFIG.gps.maxSpeed || distGPS > CONFIG.gps.maxJumpDistance) {
        valid = false;
        gpsStatusEl.innerHTML += ' 🚫 Nhảy vị trí';
        let penaltySteps = CONFIG.gps.jumpPenaltySteps;
        let penaltyMeters = CONFIG.gps.jumpPenaltyMeters;
        if (speedGPS > CONFIG.gps.vehicleSpeedThreshold) {
          penaltySteps *= 2;
          penaltyMeters *= 2;
          showViolation(`🚗 Phương tiện: -${penaltySteps} bước, -${penaltyMeters}m`);
        } else {
          showViolation(`📡 GPS nhảy: -${penaltySteps} bước, -${penaltyMeters}m`);
        }
        penalizeStepsAndDistance(penaltySteps, penaltyMeters);
      }
      if (!isMoving && speedGPS < CONFIG.drift.minMovementSpeed) {
        valid = false;
        fusionBadge.innerHTML = '🛑 Đứng yên';
      }
      
      if (valid && isActive && !isPaused && distGPS >= CONFIG.gps.minDistance) {
        // Đồng bộ bước chân và GPS
        const stepDistance = stepsSinceLastGps * currentStepLength;
        const error = stepDistance - (distGPS * 1000);
        if (Math.abs(error) > CONFIG.sync.maxStepDistanceError && stepsSinceLastGps > 3) {
          let correctedStepLength = (distGPS * 1000) / stepsSinceLastGps;
          correctedStepLength = Math.min(CONFIG.pedometer.stepLengthMax, Math.max(CONFIG.pedometer.stepLengthMin, correctedStepLength));
          currentStepLength = currentStepLength * 0.7 + correctedStepLength * 0.3;
          fusionBadge.innerHTML = `🔄 Đồng bộ: ${currentStepLength.toFixed(2)}m`;
          setTimeout(() => {
            if (isActive && !isPaused) fusionBadge.innerHTML = `⚖️ Bước: ${currentStepLength.toFixed(2)}m`;
          }, 2000);
        }
        
        accGpsDistForCalib += distGPS;
        
        let addedDistance = distGPS;
        if (accuracy > CONFIG.gps.mediumAccuracy) {
          const stepDistKm = (stepsSinceLastGps * currentStepLength) / 1000;
          const weight = Math.min(0.7, Math.max(0.3, 1 - (accuracy - 15)/30));
          addedDistance = distGPS * weight + stepDistKm * (1 - weight);
          fusionBadge.innerHTML = `⚖️ Kết hợp (${Math.round(weight*100)}% GPS)`;
        } else {
          fusionBadge.innerHTML = `🛰️ GPS (${Math.round(accuracy)}m)`;
        }
        currentDistanceKm += addedDistance;
        
        // Hiệu chỉnh dài hạn
        if (accStepsForCalib >= CONFIG.pedometer.calibrationSteps && accGpsDistForCalib > 0.01) {
          const rawStepLength = (accGpsDistForCalib * 1000) / accStepsForCalib;
          const clamped = Math.min(CONFIG.pedometer.stepLengthMax, Math.max(CONFIG.pedometer.stepLengthMin, rawStepLength));
          currentStepLength = currentStepLength * 0.6 + clamped * 0.4;
          accStepsForCalib = 0;
          accGpsDistForCalib = 0;
          fusionBadge.innerHTML = `📏 Hiệu chỉnh: ${currentStepLength.toFixed(2)}m`;
          setTimeout(() => {
            if (isActive && !isPaused) fusionBadge.innerHTML = `⚖️ Bước: ${currentStepLength.toFixed(2)}m`;
          }, 1500);
        }
        
        lastValidPosition = { lat: filteredLat, lng: filteredLng, timestamp: now };
        lastKnownLatLng = { lat: filteredLat, lng: filteredLng };
        updateMarker(filteredLat, filteredLng);
        addPathPoint(filteredLat, filteredLng, currentSpeed);
        stepsSinceLastGps = 0;
      } else if (valid) {
        lastValidPosition = { lat: filteredLat, lng: filteredLng, timestamp: now };
        lastKnownLatLng = { lat: filteredLat, lng: filteredLng };
        updateMarker(filteredLat, filteredLng);
        addPathPoint(filteredLat, filteredLng, currentSpeed);
      }
      
      updateUI();
      if (currentDistanceKm >= targetDistanceKm) completeGoal();
    }
    
    function kalmanUpdate(measuredLat, measuredLng, dt, accuracy) {
      if (kalman.lat === null) {
        kalman.lat = measuredLat;
        kalman.lng = measuredLng;
        return { lat: measuredLat, lng: measuredLng };
      }
      const R = Math.max(1, Math.min(50, accuracy)) * 0.3;
      const Q = CONFIG.kalman.Q * dt;
      let predLat = kalman.lat + kalman.vLat * dt;
      let predLng = kalman.lng + kalman.vLng * dt;
      let P = kalman.P + Q;
      const K = P / (P + R);
      const innovLat = measuredLat - predLat;
      const innovLng = measuredLng - predLng;
      kalman.lat = predLat + K * innovLat;
      kalman.lng = predLng + K * innovLng;
      kalman.vLat = kalman.vLat + (K * innovLat) / dt;
      kalman.vLng = kalman.vLng + (K * innovLng) / dt;
      kalman.P = (1 - K) * P;
      return { lat: kalman.lat, lng: kalman.lng };
    }
    
    function handlePositionError(err) {
      gpsStatusEl.innerHTML = `❌ Mất GPS - Dùng bước + la bàn`;
      fusionBadge.innerHTML = '🧭 Bước + La bàn';
    }
    
    function startWatchingGPS() {
      if (!navigator.geolocation) {
        alert('Trình duyệt không hỗ trợ GPS');
        return;
      }
      if (watchId) navigator.geolocation.clearWatch(watchId);
      watchId = navigator.geolocation.watchPosition(handlePosition, handlePositionError, {
        enableHighAccuracy: true,
        maximumAge: 0,
        timeout: 5000
      });
    }
    
    // ---------- ĐIỀU KHIỂN ----------
    function startActivity() {
      if (!watchId) startWatchingGPS();
      isActive = true;
      isPaused = false;
      if (!startTime) startTime = Date.now() - elapsedSeconds * 1000;
      else startTime = Date.now() - elapsedSeconds * 1000;
      timerInterval = setInterval(() => {
        if (isActive && !isPaused) {
          elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
          updateUI();
        }
      }, 200);
      startBtn.disabled = true;
      pauseBtn.disabled = false;
      stopBtn.disabled = false;
    }
    
    function pauseActivity() {
      if (!isActive) return;
      isPaused = !isPaused;
      if (isPaused) {
        clearInterval(timerInterval);
        pauseBtn.innerHTML = '<i class="fas fa-play"></i> TIẾP TỤC';
      } else {
        startTime = Date.now() - elapsedSeconds * 1000;
        timerInterval = setInterval(() => {
          elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
          updateUI();
        }, 200);
        pauseBtn.innerHTML = '<i class="fas fa-pause"></i> TẠM DỪNG';
      }
    }
    
    function stopActivity() {
      isActive = false;
      isPaused = false;
      clearInterval(timerInterval);
      startBtn.disabled = false;
      pauseBtn.disabled = true;
      stopBtn.disabled = true;
      pauseBtn.innerHTML = '<i class="fas fa-pause"></i> TẠM DỪNG';
    }
    
    function resetSession() {
      currentDistanceKm = 0;
      steps = 0;
      elapsedSeconds = 0;
      startTime = null;
      kalman = { lat: null, lng: null, vLat: 0, vLng: 0, P: CONFIG.kalman.P };
      lastGpsTimestamp = null;
      lastFusionTimestamp = null;
      lastValidPosition = null;
      lastStepTime = 0;
      shakeCounter = 0;
      stepTrust = true;
      currentStepLength = CONFIG.pedometer.defaultStepLength;
      stepsSinceLastGps = 0;
      accStepsForCalib = 0;
      accGpsDistForCalib = 0;
      accHistory = [];
      isMoving = false;
      currentSpeed = 0;
      pathPoints = [];
      if (pathPolyline) map.removeLayer(pathPolyline);
      pathPolyline = null;
      stepTrustDisplay.innerHTML = '✅ Hợp lệ';
      stepTrustDisplay.style.color = '#4ade80';
      fusionBadge.innerHTML = '⚖️ Chờ dữ liệu';
      generateRandomTarget();
      updateUI();
    }
    
    function completeGoal() {
      if (!isActive) return;
      isActive = false;
      isPaused = false;
      clearInterval(timerInterval);
      startBtn.disabled = false;
      pauseBtn.disabled = true;
      stopBtn.disabled = true;
      const voucher = 'VTGO-' + Math.random().toString(36).substring(2, 8).toUpperCase();
      voucherCodeEl.textContent = voucher;
      modalOverlay.style.visibility = 'visible';
    }
    
    function generateRandomTarget() {
      const randomMeters = Math.floor(Math.random() * (300 - 50 + 1)) + 50;
      targetDistanceKm = randomMeters / 1000;
      targetDisplay.textContent = `🎲 ${randomMeters}m`;
      return randomMeters;
    }
    
    // ---------- MAP ----------
    function initMap() {
      map = L.map('map', { zoomControl: false, attributionControl: false })
        .setView([10.3469, 107.0843], 17);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        subdomains: 'abcd', maxZoom: 21
      }).addTo(map);
      L.control.attribution({position: 'bottomleft'}).addTo(map);
      L.control.zoom({position: 'bottomright'}).addTo(map);
      navigator.geolocation.getCurrentPosition((pos) => {
        map.setView([pos.coords.latitude, pos.coords.longitude], 18);
        updateMarker(pos.coords.latitude, pos.coords.longitude);
        addPathPoint(pos.coords.latitude, pos.coords.longitude, 0);
        gpsStatusEl.innerHTML = '📍 Sẵn sàng';
      }, ()=>{}, {enableHighAccuracy: true});
    }
    
    // ---------- EVENT LISTENERS ----------
    randomTargetBtn.addEventListener('click', () => {
      if (!isActive) generateRandomTarget();
    });
    startBtn.addEventListener('click', () => {
      if (!isActive) {
        if (currentDistanceKm === 0) resetSession();
        requestMotionPermission();
        startActivity();
      }
    });
    pauseBtn.addEventListener('click', pauseActivity);
    stopBtn.addEventListener('click', stopActivity);
    closeModalBtn.addEventListener('click', () => {
      modalOverlay.style.visibility = 'hidden';
      resetSession();
    });
    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) modalOverlay.style.visibility = 'hidden';
    });
    
    initMap();
    startWatchingGPS();
    initCompass();
    updateUI();
  })();
</script>
