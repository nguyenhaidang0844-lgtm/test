<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VungTauGO! Indoor & Outdoor</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root { --primary: #00ff88; --dark: #0f172a; }
    body { font-family: sans-serif; background: var(--dark); color: white; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; }
    .header { padding: 20px; text-align: center; background: rgba(30, 41, 59, 0.8); z-index: 1000; }
    .stat-val { font-size: 35px; font-weight: bold; color: var(--primary); }
    #map { flex: 1; width: 100%; }
    .controls { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: center; z-index: 1000; }
    .btn { padding: 15px 40px; border-radius: 30px; border: none; background: var(--primary); font-weight: bold; font-size: 18px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,255,136,0.3); }
    .badge { background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 10px; font-size: 12px; margin-top: 5px; display: inline-block; }
  </style>
</head>
<body>

<div class="header">
  <div style="display: flex; justify-content: space-around;">
    <div>
      <div class="stat-val" id="stepTxt">0</div>
      <div style="font-size: 12px; color: #94a3b8;">BƯỚC CHÂN</div>
    </div>
    <div>
      <div class="stat-val" id="distTxt">0.00</div>
      <div style="font-size: 12px; color: #94a3b8;">QUÃNG ĐƯỜNG (M)</div>
    </div>
  </div>
  <div class="badge" id="status">Chờ bắt đầu...</div>
</div>

<div id="map"></div>

<div class="controls">
  <button class="btn" id="startBtn">BẮT ĐẦU NGAY</button>
</div>

<script>
(function() {
    let state = { active: false, steps: 0, dist: 0, path: [], lastStepTime: 0, heading: 0 };
    let map, polyline, marker;
    const stride = 0.7; // sải chân 0.7m

    function initMap() {
        map = L.map('map', { zoomControl: false }).setView([10.346, 107.084], 18);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        polyline = L.polyline([], { color: '#00ff88', weight: 5, shadowBlur: 5, shadowColor: '#00ff88' }).addTo(map);
        marker = L.circleMarker([0,0], { radius: 8, color: '#fff', fillColor: '#00ff88', fillOpacity: 1 }).addTo(map);
        
        // Tự động định vị ban đầu
        map.locate({setView: true, maxZoom: 18});
        map.on('locationfound', (e) => {
            marker.setLatLng(e.latlng);
            if (!state.active) state.path = [e.latlng];
        });
    }

    // Đếm bước dựa trên cảm biến (Hoạt động tốt trong nhà)
    function handleMotion(e) {
        if (!state.active) return;
        let acc = e.accelerationIncludingGravity;
        let force = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
        let now = Date.now();

        if (force > 13.0 && (now - state.lastStepTime) > 300) {
            state.steps++;
            state.dist += stride;
            state.lastStepTime = now;
            updateUI();
            
            // Vẽ "giả lập" cung đường dựa trên hướng la bàn nếu GPS yếu
            simulatePath();
        }
    }

    function handleOrientation(e) {
        state.heading = e.webkitCompassHeading || (360 - e.alpha);
    }

    function simulatePath() {
        if (state.path.length === 0) return;
        let last = state.path[state.path.length - 1];
        
        // Tính tọa độ mới (Dead Reckoning) dựa trên Heading và sải chân
        let R = 6378137;
        let d = stride;
        let brng = state.heading * Math.PI / 180;
        let lat1 = last.lat * Math.PI / 180;
        let lon1 = last.lng * Math.PI / 180;

        let lat2 = Math.asin(Math.sin(lat1)*Math.cos(d/R) + Math.cos(lat1)*Math.sin(d/R)*Math.cos(brng));
        let lon2 = lon1 + Math.atan2(Math.sin(brng)*Math.sin(d/R)*Math.cos(lat1), Math.cos(d/R)-Math.sin(lat1)*Math.sin(lat2));

        let newPoint = L.latLng(lat2 * 180 / Math.PI, lon2 * 180 / Math.PI);
        state.path.push(newPoint);
        polyline.setLatLngs(state.path);
        marker.setLatLng(newPoint);
        map.panTo(newPoint);
    }

    function updateUI() {
        document.getElementById('stepTxt').innerText = state.steps;
        document.getElementById('distTxt').innerText = state.dist.toFixed(2);
    }

    document.getElementById('startBtn').addEventListener('click', async () => {
        if (typeof DeviceMotionEvent.requestPermission === 'function') {
            await DeviceMotionEvent.requestPermission();
            await DeviceOrientationEvent.requestPermission();
        }
        window.addEventListener('devicemotion', handleMotion);
        window.addEventListener('deviceorientation', handleOrientation);
        state.active = true;
        document.getElementById('status').innerText = "🟢 Đang theo dõi...";
        document.getElementById('startBtn').style.display = 'none';
    });

    initMap();
})();
</script>
</body>
</html>
